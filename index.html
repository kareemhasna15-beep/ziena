<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeina — Home &amp; Kitchen Accessories</title>
<meta name="description" content="Zeina Home & Kitchen Accessories — elegant dinnerware, gold cutlery, coffee sets, serveware and décor in Lebanon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --magenta:#BA1270;--magenta-deep:#8C0D54;--plum:#4A0A30;
  --blush:#FBEFF6;--blush-2:#F6DFEC;--ivory:#FFFBF7;
  --gold:#C29A4B;--gold-soft:#E8D5AC;
  --ink:#33222C;--ink-soft:#7A6470;
  --radius:18px;--shadow:0 10px 30px rgba(140,13,84,.10);
  --ok:#1E9E62;--warn:#D97706;--bad:#DC2626;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Jost','Tajawal',sans-serif;color:var(--ink);background:var(--ivory);line-height:1.6;overflow-x:hidden}
html[dir="rtl"] body{font-family:'Tajawal','Jost',sans-serif}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.2}
html[dir="rtl"] h1,html[dir="rtl"] h2,html[dir="rtl"] h3,html[dir="rtl"] h4{font-family:'Tajawal',sans-serif;font-weight:700}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}

/* ── Header ── */
header{position:sticky;top:0;z-index:50;background:rgba(255,251,247,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--blush-2)}
.nav{display:flex;align-items:center;justify-content:space-between;height:80px;gap:12px}
.logo{display:flex;flex-direction:column;line-height:1;flex-shrink:0;cursor:pointer}
.logo .script{font-family:'Parisienne',cursive;font-size:1.9rem;color:var(--magenta);line-height:1.25;display:block}
.logo .sub{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-top:7px;padding-inline-start:2px}
.nav-links{display:flex;gap:24px;font-size:.86rem;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
html[dir="rtl"] .nav-links{letter-spacing:0;text-transform:none;font-size:.95rem}
.nav-links a{padding:6px 0;border-bottom:2px solid transparent;transition:.25s;cursor:pointer}
.nav-links a:hover{color:var(--magenta);border-color:var(--magenta)}
.nav-right{display:flex;align-items:center;gap:10px}
.toggle{display:flex;border:1.5px solid var(--blush-2);border-radius:999px;overflow:hidden;background:#fff}
.toggle button{border:none;background:transparent;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--ink-soft);transition:.2s;line-height:1.4}
.toggle button.on{background:var(--magenta);color:#fff}
.cart-btn{position:relative;background:var(--magenta);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(186,18,112,.28);transition:.25s}
.cart-btn:hover{background:var(--magenta-deep)}
.cart-btn svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.cart-count{position:absolute;top:-4px;inset-inline-end:-4px;background:var(--gold);color:#fff;font-size:.68rem;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.burger{display:none;background:none;border:none;cursor:pointer;padding:8px}
.burger span{display:block;width:24px;height:2px;background:var(--magenta);margin:5px 0}

/* ── Buttons / shared ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;border-radius:999px;font-weight:500;letter-spacing:.04em;font-size:.9rem;transition:.25s;cursor:pointer;border:none}
.btn-primary{background:var(--magenta);color:#fff;box-shadow:0 8px 24px rgba(186,18,112,.3)}
.btn-primary:hover{background:var(--magenta-deep);transform:translateY(-2px)}
.btn-ghost{border:1.5px solid var(--magenta);color:var(--magenta);background:transparent}
.btn-ghost:hover{background:var(--magenta);color:#fff}
.btn-sm{padding:9px 18px;font-size:.8rem}
.btn-add{background:var(--magenta);color:#fff;border:none;border-radius:999px;padding:9px 18px;font-size:.8rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.22s}
.btn-add:hover{background:var(--magenta-deep)}
.btn-add.added{background:var(--ok)}
section{padding:70px 0}
.sec-head{text-align:center;max-width:620px;margin:0 auto 46px}
.sec-head h2{font-size:clamp(1.9rem,3.6vw,2.7rem);color:var(--plum)}
.sec-head h2 em{font-family:'Parisienne',cursive;font-style:normal;color:var(--magenta);font-weight:400}
html[dir="rtl"] .sec-head h2 em{font-family:'Tajawal',sans-serif;font-weight:700}
.sec-head p{color:var(--ink-soft);margin-top:10px}
.divider{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;color:var(--gold)}
.divider::before,.divider::after{content:'';width:56px;height:1px;background:var(--gold-soft)}

/* ── Hero ── */
.hero{position:relative;background:linear-gradient(160deg,var(--blush) 0%,#fff 55%,var(--blush) 100%);padding:80px 0 92px;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:.74rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:18px}
html[dir="rtl"] .eyebrow{letter-spacing:.05em}
.eyebrow::before{content:'';width:34px;height:1px;background:var(--gold)}
.hero h1{font-size:clamp(2.3rem,5vw,3.9rem);color:var(--plum);margin-bottom:8px}
.hero h1 .script{font-family:'Parisienne',cursive;font-weight:400;color:var(--magenta);font-size:1.25em}
html[dir="rtl"] .hero h1 .script{font-family:'Tajawal',sans-serif;font-size:1em;font-weight:700}
.hero p{color:var(--ink-soft);max-width:46ch;margin:14px 0 30px;font-size:1.05rem}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap}
.hero-visual{position:relative;display:flex;justify-content:center}
.hero-plate{width:min(360px,78vw);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,var(--blush) 45%,var(--blush-2) 100%);border:1px solid var(--gold-soft);box-shadow:var(--shadow),inset 0 0 0 22px #fff,inset 0 0 0 24px var(--gold-soft);display:flex;align-items:center;justify-content:center;animation:float 7s ease-in-out infinite}
.hero-plate svg{width:52%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ── Marquee ── */
.bestsellers{background:linear-gradient(180deg,#fff 0%,var(--blush) 100%);padding-bottom:86px}
.marquee{overflow:hidden;position:relative;padding:12px 0;direction:ltr;-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)}
.track{display:flex;gap:24px;width:max-content;animation:scroll 42s linear infinite}
.marquee:hover .track{animation-play-state:paused}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media(prefers-reduced-motion:reduce){.track{animation:none}.marquee{overflow-x:auto;mask-image:none;-webkit-mask-image:none}.hero-plate{animation:none}}
.bs-card{width:250px;flex-shrink:0;background:#fff;border-radius:var(--radius);border:1px solid var(--blush-2);box-shadow:var(--shadow);overflow:hidden;transition:.3s;cursor:pointer}
.bs-card:hover{transform:translateY(-6px);border-color:var(--gold-soft)}
.bs-art{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bs-art svg{width:66px;height:66px}
.bs-art img{width:100%;height:100%;object-fit:cover}
.bs-rank{position:absolute;top:12px;inset-inline-start:12px;background:var(--magenta);color:#fff;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:5px 11px;border-radius:999px;z-index:2}
html[dir="rtl"] .bs-rank{letter-spacing:0}
.bs-body{padding:14px 16px 18px}
.bs-body h3{font-size:1.06rem;color:var(--plum)}
.bs-body .price{display:block;margin:6px 0 10px;font-weight:600;color:var(--magenta)}

.g1{background:linear-gradient(135deg,#FDECF5,#F7D7E9)}
.g2{background:linear-gradient(135deg,#FBF3E4,#F1E2C4)}
.g3{background:linear-gradient(135deg,#F2EDF9,#E3D9F0)}
.g4{background:linear-gradient(135deg,#EAF4F1,#D5E8E1)}
.g5{background:linear-gradient(135deg,#FDF0EC,#F7DCD2)}

/* ── Categories ── */
.cats{background:#fff}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.cat-card{position:relative;border-radius:var(--radius);padding:28px 24px;border:1px solid var(--blush-2);background:linear-gradient(160deg,#fff,var(--blush));transition:.3s;cursor:pointer;overflow:hidden}
.cat-card:hover{border-color:var(--magenta);transform:translateY(-4px);box-shadow:var(--shadow)}
.cat-card svg{width:42px;height:42px;margin-bottom:12px}
.cat-card h3{font-size:1.25rem;color:var(--plum)}
.cat-card p{font-size:.85rem;color:var(--ink-soft);margin-top:4px}
.cat-card .count{position:absolute;top:18px;inset-inline-end:18px;font-size:.72rem;color:var(--gold);font-weight:600}

/* ── Catalog ── */
.catalog{background:linear-gradient(180deg,var(--blush) 0%,#fff 30%)}
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:38px}
.chip{padding:9px 20px;border-radius:999px;border:1.5px solid var(--blush-2);background:#fff;font-size:.84rem;font-weight:500;cursor:pointer;transition:.22s;color:var(--ink-soft)}
.chip:hover{border-color:var(--magenta);color:var(--magenta)}
.chip.active{background:var(--magenta);border-color:var(--magenta);color:#fff}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px}
.prod{background:#fff;border:1px solid var(--blush-2);border-radius:var(--radius);overflow:hidden;transition:.3s;display:flex;flex-direction:column}
.prod:hover{box-shadow:var(--shadow);transform:translateY(-4px);border-color:var(--gold-soft)}
.prod-art{height:140px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
.prod-art svg{width:56px;height:56px}
.prod-art img{width:100%;height:100%;object-fit:cover}
.tag-best{position:absolute;top:10px;inset-inline-end:10px;background:var(--gold);color:#fff;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:4px 10px;border-radius:999px;z-index:2}
html[dir="rtl"] .tag-best{letter-spacing:0}
.prod-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:4px;flex:1}
.prod-body h3{font-size:1.02rem;color:var(--plum);line-height:1.3;cursor:pointer}
.prod-body h3:hover{color:var(--magenta)}
.prod-body .price{font-weight:600;color:var(--magenta);margin-top:2px}
.prod-body .actions{margin-top:auto;padding-top:12px}
.loading{grid-column:1/-1;text-align:center;color:var(--ink-soft);padding:60px 0}
.spinner{width:34px;height:34px;border:3px solid var(--blush-2);border-top-color:var(--magenta);border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Product page ── */
.pd{padding:50px 0 70px}
.crumb{font-size:.82rem;color:var(--ink-soft);margin-bottom:30px}
.crumb a{color:var(--magenta);cursor:pointer}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start}
.pd-visual{border-radius:24px;border:1px solid var(--blush-2);min-height:380px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
.pd-visual svg{width:160px;height:160px}
.pd-visual img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pd-info h1{font-size:clamp(1.7rem,3.4vw,2.5rem);color:var(--plum)}
.pd-info .ar2{color:var(--ink-soft);margin-top:4px;font-size:1.05rem}
.pd-info .cat-link{display:inline-block;margin-top:12px;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;cursor:pointer}
html[dir="rtl"] .pd-info .cat-link{letter-spacing:0}
.pd-price{font-size:1.9rem;font-weight:600;color:var(--magenta);margin:20px 0 8px;font-family:'Cormorant Garamond',serif}
html[dir="rtl"] .pd-price{font-family:'Tajawal',sans-serif}
.qty{display:inline-flex;align-items:center;border:1.5px solid var(--blush-2);border-radius:999px;overflow:hidden;vertical-align:middle}
.qty button{width:40px;height:44px;border:none;background:#fff;font-size:1.2rem;cursor:pointer;color:var(--magenta)}
.qty button:hover{background:var(--blush)}
.qty span{min-width:36px;text-align:center;font-weight:600}
.pd-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rail-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
.rail-head h2{font-size:1.5rem;color:var(--plum)}
.rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
.rail-sec{padding:34px 0 8px}

/* ── Cart drawer ── */
.drawer-bg{position:fixed;inset:0;background:rgba(74,10,48,.35);z-index:70;opacity:0;pointer-events:none;transition:.3s}
.drawer-bg.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;bottom:0;inset-inline-end:0;width:min(420px,94vw);background:#fff;z-index:71;box-shadow:-10px 0 40px rgba(0,0,0,.15);transform:translateX(100%);transition:.32s;display:flex;flex-direction:column}
html[dir="rtl"] .drawer{transform:translateX(-100%)}
.drawer.open{transform:translateX(0)!important}
.drawer-head{padding:20px 22px;border-bottom:1px solid var(--blush-2);display:flex;justify-content:space-between;align-items:center}
.drawer-head h3{color:var(--plum);font-size:1.3rem}
.drawer-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink-soft);line-height:1}
.drawer-items{flex:1;overflow-y:auto;padding:16px 22px}
.c-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--blush)}
.c-art{width:62px;height:62px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.c-art svg{width:34px;height:34px}
.c-art img{width:100%;height:100%;object-fit:cover}
.c-info{flex:1;min-width:0}
.c-info h4{font-size:.92rem;color:var(--plum);line-height:1.3}
.c-info .p{color:var(--magenta);font-weight:600;font-size:.88rem;margin-top:2px}
.c-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.c-qty button{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--blush-2);background:#fff;cursor:pointer;color:var(--magenta);font-weight:600}
.c-rm{background:none;border:none;color:var(--bad);cursor:pointer;font-size:.74rem;margin-inline-start:8px}
.drawer-foot{padding:18px 22px;border-top:1px solid var(--blush-2)}
.d-total{display:flex;justify-content:space-between;font-weight:600;font-size:1.06rem;margin-bottom:14px;color:var(--plum)}
.empty{color:var(--ink-soft);text-align:center;padding:40px 10px}

/* ── Checkout ── */
.checkout-card{max-width:640px;margin:0 auto;background:#fff;border:1px solid var(--blush-2);border-radius:24px;padding:40px 34px;box-shadow:var(--shadow)}
.checkout-card h2{color:var(--plum);margin-bottom:20px}
.f-group{margin-bottom:16px}
.f-group label{display:block;font-size:.82rem;font-weight:600;color:var(--plum);margin-bottom:6px}
.f-group input,.f-group textarea,.f-group select{width:100%;padding:12px 14px;border:1.5px solid var(--blush-2);border-radius:12px;font-family:inherit;font-size:.95rem;background:var(--ivory)}
.f-group input:focus,.f-group textarea:focus,.f-group select:focus{outline:none;border-color:var(--magenta)}
.co-summary{background:var(--blush);border-radius:14px;padding:16px 18px;margin:20px 0;font-size:.9rem}
.co-summary .line{display:flex;justify-content:space-between;padding:3px 0}
.co-summary .tot{font-weight:700;color:var(--plum);border-top:1px solid var(--blush-2);margin-top:8px;padding-top:8px}

/* ── About/contact/footer ── */
.about{background:var(--plum);color:#fff;text-align:center}
.about h2{color:#fff;font-size:clamp(1.8rem,3.4vw,2.5rem)}
.about h2 em{font-family:'Parisienne',cursive;font-style:normal;color:var(--gold-soft);font-weight:400}
html[dir="rtl"] .about h2 em{font-family:'Tajawal',sans-serif;font-weight:700}
.about p{color:rgba(255,255,255,.75);max-width:60ch;margin:16px auto 0}
.contact{text-align:center}
.contact-card{max-width:560px;margin:0 auto;background:linear-gradient(160deg,#fff,var(--blush));border:1px solid var(--blush-2);border-radius:24px;padding:44px 34px;box-shadow:var(--shadow)}
.contact-card h2{color:var(--plum);font-size:2rem}
.contact-card p{color:var(--ink-soft);margin:12px 0 26px}
footer{background:var(--plum);color:rgba(255,255,255,.65);padding:34px 0;text-align:center;font-size:.85rem}
footer .script{font-family:'Parisienne',cursive;font-size:1.6rem;color:#fff;display:block;margin-bottom:10px;line-height:1.3}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translate(-50%,80px);background:var(--plum);color:#fff;padding:12px 24px;border-radius:999px;font-size:.88rem;z-index:90;transition:.35s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}

/* ── Admin ── */
.admin{padding:40px 0 80px;background:#F7F2F5;min-height:100vh}
.admin-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:26px}
.admin-head h1{color:var(--plum);font-size:1.8rem}
.a-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.a-tab{padding:9px 20px;border-radius:999px;border:1.5px solid var(--blush-2);background:#fff;font-size:.86rem;font-weight:500;cursor:pointer;color:var(--ink-soft)}
.a-tab.active{background:var(--plum);border-color:var(--plum);color:#fff}
.a-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.a-card{background:#fff;border-radius:16px;padding:20px 22px;border:1px solid var(--blush-2)}
.a-card .v{font-size:1.8rem;font-weight:700;color:var(--magenta);font-family:'Cormorant Garamond',serif}
html[dir="rtl"] .a-card .v{font-family:'Tajawal',sans-serif}
.a-card .l{font-size:.78rem;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase}
.a-panel{background:#fff;border-radius:18px;border:1px solid var(--blush-2);padding:24px;overflow-x:auto}
.a-panel h3{color:var(--plum);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{text-align:start;padding:10px 10px;color:var(--ink-soft);font-weight:600;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;border-bottom:2px solid var(--blush-2)}
td{padding:11px 10px;border-bottom:1px solid var(--blush);vertical-align:middle}
.a-actions button{border:none;background:none;cursor:pointer;font-size:.8rem;font-weight:600;margin-inline-end:10px}
.a-edit{color:var(--magenta)}.a-del{color:var(--bad)}
.status{font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:999px;cursor:pointer;border:none}
.st-new{background:#FEF3C7;color:#92400E}
.st-done{background:#D1FAE5;color:#065F46}
.st-cancel{background:#FEE2E2;color:#991B1B}
.a-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.a-form-grid .full{grid-column:1/-1}
.a-login{max-width:400px;margin:80px auto;background:#fff;padding:40px;border-radius:20px;border:1px solid var(--blush-2);text-align:center;box-shadow:var(--shadow)}
.a-login h2{color:var(--plum);margin-bottom:6px}
.a-login p{color:var(--ink-soft);font-size:.88rem;margin-bottom:20px}
.icon-pick{display:flex;flex-wrap:wrap;gap:8px}
.icon-pick button{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--blush-2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px}
.icon-pick button.on{border-color:var(--magenta);background:var(--blush)}
.icon-pick svg{width:100%;height:100%}
.a-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.muted{color:var(--ink-soft);font-size:.82rem}
.warn-banner{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;border-radius:12px;padding:12px 16px;font-size:.85rem;margin-bottom:20px}

/* ── State ── */
let DB=[], ORDERS=[], cart=store.get('zeina_cart')||{};
let LANG='en', CUR='USD', FILTER='all', adminTab='dash', editingId=null, pickedIcon='mug', VIEW='home', SESSION=null;
const t=k=>T[LANG][k];
const byId=id=>DB.find(p=>p.id==id);
const pname=p=>LANG==='en'?p.en:(p.ar||p.en);
const cname=id=>{const c=categories.find(c=>c.id===id);return c?(LANG==='en'?c.en:c.ar):id};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const saveCart=()=>store.set('zeina_cart',cart);

function priceVal(usd){return usd*PRICE_MULTIPLIER}
function fmtPrice(usd){
  const v=priceVal(usd);
  if(CUR==='USD')return '$'+(v%1?v.toFixed(2):v.toFixed(0));
  const lbp=Math.round(v*LBP_RATE/500)*500;
  return lbp.toLocaleString(LANG==='ar'?'ar-LB':'en-US')+' ل.ل';
}
function fmtPriceTotal(){
  const v=cartTotal();
  if(CUR==='USD')return '$'+v.toFixed(2).replace(/\.00$/,'');
  const lbp=Math.round(v*LBP_RATE/500)*500;
  return lbp.toLocaleString(LANG==='ar'?'ar-LB':'en-US')+' ل.ل';
}

/* ── Supabase data layer ── */
function rowToProduct(r){return {id:r.id,en:r.en,ar:r.ar,c:r.category,p:+r.price,i:r.icon||'mug',g:r.gradient||'g1',best:r.best,top:r.top_seller,img:r.image_url||''}}
async function loadProducts(){
  if(DEMO){ if(!DB.length) DB=SEED.map(p=>({img:'',...p})); return true; }
  const {data,error}=await sb.from('products').select('*').order('id');
  if(error){console.error(error);return false}
  DB=data.map(rowToProduct);return true;
}
async function loadOrders(){
  if(DEMO){ ORDERS=demoOrders; return; }
  const {data,error}=await sb.from('orders').select('*').order('created_at',{ascending:false});
  if(!error)ORDERS=data;
}

/* ── Toast ── */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ── Cart ── */
function addToCart(id,qty=1,btn){
  cart[id]=(cart[id]||0)+qty;saveCart();renderCartBadge();renderDrawer();
  toast(t('toastAdd'));
  if(btn){btn.classList.add('added');const old=btn.innerHTML;btn.innerHTML=t('added');setTimeout(()=>{btn.classList.remove('added');btn.innerHTML=old;},1400);}
}
function setQty(id,q){ if(q<=0)delete cart[id];else cart[id]=q; saveCart();renderCartBadge();renderDrawer(); if(VIEW==='checkout')renderCheckout(); }
function cartCount(){return Object.values(cart).reduce((a,b)=>a+b,0)}
function cartTotal(){return Object.entries(cart).reduce((s,[id,q])=>{const p=byId(id);return p?s+priceVal(p.p)*q:s},0)}
function renderCartBadge(){document.getElementById('cartCount').textContent=cartCount()}
function toggleCart(open){
  document.getElementById('drawer').classList.toggle('open',open);
  document.getElementById('drawerBg').classList.toggle('open',open);
  if(open)renderDrawer();
}
function renderDrawer(){
  const box=document.getElementById('drawerItems');
  const entries=Object.entries(cart).map(([id,q])=>({p:byId(id),q})).filter(x=>x.p);
  if(!entries.length){box.innerHTML=`<div class="empty">${t('emptyCart')}</div>`;}
  else box.innerHTML=entries.map(({p,q})=>`
    <div class="c-item">
      <div class="c-art ${p.g}">${p.img?`<img src="${esc(p.img)}" alt="">`:(icons[p.i]||icons.mug)}</div>
      <div class="c-info">
        <h4>${esc(pname(p))}</h4>
        <div class="p">${fmtPrice(p.p)}</div>
        <div class="c-qty">
          <button onclick="setQty(${p.id},${q-1})">−</button><span>${q}</span><button onclick="setQty(${p.id},${q+1})">+</button>
          <button class="c-rm" onclick="setQty(${p.id},0)">${t('remove')}</button>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('drawerTotal').textContent=fmtPriceTotal();
}

/* ── Cards ── */
const artInner=p=>p.img?`<img src="${esc(p.img)}" alt="${esc(p.en)}" loading="lazy">`:(icons[p.i]||icons.mug);
const addBtn=id=>`<button class="btn-add" onclick="event.stopPropagation();addToCart(${id},1,this)">
  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>${t('addCart')}</button>`;
const prodCard=p=>`
  <div class="prod" data-c="${p.c}">
    <div class="prod-art ${p.g}" onclick="go('product',${p.id})">
      ${p.best?`<span class="tag-best">${t('best')}</span>`:''}

function renderBest(){
  const best=DB.filter(p=>p.best).sort((a,b)=>(b.top?1:0)-(a.top?1:0));

function renderProducts(){

/* ── PRODUCT PAGE ── */
function renderProductPage(id){
  const p=byId(id);
  if(!p){go('home');return}
  const similar=DB.filter(x=>x.c===p.c&&x.id!==p.id).slice(0,4);
  const alsoCats=alsoMap[p.c]||[];
  const also=DB.filter(x=>alsoCats.includes(x.c)).sort((a,b)=>(b.best?1:0)-(a.best?1:0)).slice(0,4);
  document.getElementById('pdContent').innerHTML=`
    <div class="crumb"><a onclick="go('home')">${t('backHome')}</a> / <a onclick="FILTER='${p.c}';go('home','catalog');renderChips();renderProducts()">${cname(p.c)}</a> / ${esc(pname(p))}</div>
    <div class="pd-grid">
      <div class="pd-visual ${p.g}">
        ${p.best?`<span class="tag-best" style="top:16px">${p.top?t('top'):t('best')}</span>`:''}
        ${artInner(p)}
      </div>
      <div class="pd-info">
        <h1>${esc(pname(p))}</h1>
        <div class="ar2" dir="${LANG==='en'?'rtl':'ltr'}" style="text-align:start">${esc(LANG==='en'?(p.ar||''):p.en)}</div>
        <span class="cat-link" onclick="FILTER='${p.c}';go('home','catalog');renderChips();renderProducts()">${cname(p.c)}</span>
        <div class="pd-price">${fmtPrice(p.p)}</div>
        <div class="pd-row">
          <div class="qty"><button onclick="pdQty(-1)">−</button><span id="pdQty">1</span><button onclick="pdQty(1)">+</button></div>
          <button class="btn btn-primary" onclick="addToCart(${p.id},parseInt(document.getElementById('pdQty').textContent),this)">${t('addCart')}</button>
        </div>
      </div>
    </div>
    ${similar.length?`<div class="rail-sec"><div class="rail-head"><h2>${t('similar')}</h2></div><div class="rail">${similar.map(prodCard).join('')}</div></div>`:''}
    ${also.length?`<div class="rail-sec"><div class="rail-head"><h2>${t('alsoBuy')}</h2></div><div class="rail">${also.map(prodCard).join('')}</div></div>`:''}
  `;

function pdQty(d){
  const el=document.getElementById('pdQty');

async function sendOrder(){
  const name=document.getElementById('coName').value.trim();
  const phone=document.getElementById('coPhone').value.trim();
  const addr=document.getElementById('coAddr').value.trim();
  const note=document.getElementById('coNote').value.trim();
  if(!name||!phone||!addr){toast(t('toastNeed'));return}
  const btn=document.getElementById('coSendBtn');btn.disabled=true;
  const entries=Object.entries(cart).map(([id,q])=>({p:byId(id),q})).filter(x=>x.p);
  const items=entries.map(({p,q})=>({pid:p.id,name:p.en,qty:q,unit:+priceVal(p.p).toFixed(2)}));
  const total=+cartTotal().toFixed(2);
  const totalTxt=fmtPriceTotal();
  let orderId;
  if(DEMO){
    orderId=++demoIdSeq;
    demoOrders.unshift({id:orderId,created_at:new Date().toISOString(),name,phone,address:addr,note,items,total,status:'new'});
  }else{
    const {data,error}=await sb.from('orders').insert({name,phone,address:addr,note,items,total,status:'new'}).select().single();
    if(error){console.error('order insert failed',error);toast(t('coFail'));btn.disabled=false;return}
    orderId=data.id;
  }
  /* build optional WhatsApp message for the confirmation screen */
  let msg=t('waOrder');
  entries.forEach(({p,q})=>{msg+=`• ${q} × ${p.en} — $${(priceVal(p.p)*q).toFixed(2)}%0A`});
  msg+=`%0A${t('waTotal')}: ${totalTxt}%0A${t('waName')}: ${encodeURIComponent(name)}%0A${t('waPhone')}: ${encodeURIComponent(phone)}%0A${t('waAddr')}: ${encodeURIComponent(addr)}`;
  if(note)msg+=`%0A${t('waNote')}: ${encodeURIComponent(note)}`;
  cart={};saveCart();renderCartBadge();
  renderOrderDone(orderId,entries,totalTxt,msg);
  window.scrollTo({top:0});
}
function renderOrderDone(orderId,entries,totalTxt,waMsg){
  document.getElementById('coContent').innerHTML=`
    <div style="text-align:center">
      <div style="width:74px;height:74px;border-radius:50%;background:var(--blush);border:2px solid var(--magenta);display:flex;align-items:center;justify-content:center;margin:0 auto 18px">
        <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="var(--magenta)" stroke-width="2.6" stroke-linecap="round"><path d="M4 12.5l5 5L20 6.5"/></svg>
      </div>
      <h2 style="color:var(--plum)">${t('doneTitle')}</h2>
      <p style="color:var(--ink-soft);margin:8px 0 4px">${t('doneNo')}: <b style="color:var(--magenta)">#${orderId}</b></p>
      <p style="color:var(--ink-soft);max-width:44ch;margin:0 auto 22px">${t('doneMsg')}</p>
      <div class="co-summary" style="text-align:start">
        ${entries.map(({p,q})=>`<div class="line"><span>${q} × ${esc(pname(p))}</span><span>${fmtPrice(p.p*q)}</span></div>`).join('')}
        <div class="line tot"><span>${t('total')}</span><span>${totalTxt}</span></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px">
        <a class="btn btn-ghost" href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank" rel="noopener">${t('doneWa')}</a>
        <button class="btn btn-primary" onclick="go('home')">${t('doneBack')}</button>
      </div>
    </div>`;
}

/* ── ADMIN (Supabase auth + data) ── */
async function renderAdmin(){
  const box=document.getElementById('adminContent');
  if(DEMO && !SESSION){
    box.innerHTML=`<div class="a-login">
      <h2>Zeina Admin</h2>
      <p><b>Demo mode</b> — Supabase keys are not filled in yet, so this uses sample data. Try everything freely; changes are not saved. To go live, fill in SUPABASE_URL and SUPABASE_ANON_KEY at the top of the file.</p>
      <button class="btn btn-primary" style="width:100%" onclick="SESSION={demo:true};renderAdmin()">Enter demo admin</button>
    </div>`;
    return;
  }
  if(!SESSION){
    box.innerHTML=`<div class="a-login">
      <h2>Zeina Admin</h2><p>Sign in with your admin account.</p>
      <div class="f-group"><input id="aEmail" type="email" placeholder="Email" dir="ltr"></div>
      <div class="f-group"><input id="aPass" type="password" placeholder="Password" dir="ltr" onkeydown="if(event.key==='Enter')adminLogin()"></div>
      <button class="btn btn-primary" style="width:100%" onclick="adminLogin()">Login</button>
    </div>`;
    return;
  }
  await loadOrders();
  const done=ORDERS.filter(o=>o.status==='done');
  const revenue=done.reduce((s,o)=>s+(+o.total),0);
  const unitsSold={};
  done.forEach(o=>(o.items||[]).forEach(it=>{unitsSold[it.name]=(unitsSold[it.name]||0)+(+it.qty||0)}));
  const topSellers=Object.entries(unitsSold).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const tabs=`<div class="a-tabs">
    ${['dash|Dashboard','products|Products','orders|Orders & Sales'].map(x=>{const[i,l]=x.split('|');
      return `<button class="a-tab ${adminTab===i?'active':''}" onclick="adminTab='${i}';renderAdmin()">${l}</button>`}).join('')}
  </div>`;

  let body='';
  if(adminTab==='dash'){
    body=`
    <div class="a-cards">
      <div class="a-card"><div class="v">${DB.length}</div><div class="l">Products</div></div>
      <div class="a-card"><div class="v">${ORDERS.length}</div><div class="l">Orders total</div></div>
      <div class="a-card"><div class="v">${ORDERS.filter(o=>o.status==='new').length}</div><div class="l">New orders</div></div>
      <div class="a-card"><div class="v">$${revenue.toFixed(2)}</div><div class="l">Revenue (completed)</div></div>
    </div>
    <div class="a-panel">
      <h3>Top selling products (completed orders)</h3>
      ${topSellers.length?`<table><tr><th>Product</th><th>Units sold</th></tr>
        ${topSellers.map(([n,q])=>`<tr><td>${esc(n)}</td><td>${q}</td></tr>`).join('')}</table>`
        :'<p class="muted">No completed sales yet. When you deliver an order, open Orders & Sales and mark it DONE — it will count here.</p>'}
    </div>`;
  }
  if(adminTab==='products'){
    const editing=editingId!==null?DB.find(p=>p.id===editingId):null;
    body=`
    <div class="a-panel" style="margin-bottom:22px">
      <h3>${editing?'Edit product':'Add new product'}</h3>
      <div class="a-form-grid">
        <div class="f-group"><label>Name (English)</label><input id="fEn" value="${editing?esc(editing.en):''}"></div>
        <div class="f-group"><label>Name (Arabic)</label><input id="fAr" dir="rtl" value="${editing?esc(editing.ar||''):''}"></div>
        <div class="f-group"><label>Price (USD, base)</label><input id="fP" type="number" step="0.5" value="${editing?editing.p:''}"></div>
        <div class="f-group"><label>Category</label>
          <select id="fC">${categories.map(c=>`<option value="${c.id}" ${editing&&editing.c===c.id?'selected':''}>${c.en}</option>`).join('')}</select></div>
        <div class="f-group"><label>Best seller</label>
          <select id="fB"><option value="">No</option><option value="1" ${editing&&editing.best?'selected':''}>Yes</option></select></div>
        <div class="f-group"><label>Photo URL (optional)</label><input id="fImg" dir="ltr" placeholder="https://..." value="${editing?esc(editing.img||''):''}"></div>
        <div class="f-group full"><label>Icon (used when there is no photo)</label>
          <div class="icon-pick" id="iconPick">
            ${Object.keys(icons).map(k=>`<button class="${(editing?editing.i:pickedIcon)===k?'on':''}" onclick="pickedIcon='${k}';document.querySelectorAll('#iconPick button').forEach(b=>b.classList.remove('on'));this.classList.add('on')" title="${k}">${icons[k]}</button>`).join('')}
          </div></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-primary btn-sm" onclick="saveProduct()">${editing?'Save changes':'Add product'}</button>
        ${editing?`<button class="btn btn-ghost btn-sm" onclick="editingId=null;renderAdmin()">Cancel</button>`:''}
      </div>
    </div>
    <div class="a-panel">
      <h3>All products (${DB.length})</h3>
      <table><tr><th>Name</th><th>Category</th><th>Price</th><th>Best</th><th>Photo</th><th></th></tr>
      ${DB.map(p=>`<tr>
        <td>${esc(p.en)}</td><td>${cname(p.c)}</td><td>$${p.p}</td><td>${p.best?'★':''}</td><td>${p.img?'🖼':''}</td>
        <td class="a-actions">
          <button class="a-edit" onclick="editingId=${p.id};pickedIcon='${p.i}';renderAdmin().then(()=>window.scrollTo({top:0}))">Edit</button>
          <button class="a-del" onclick="deleteProduct(${p.id},'${esc(p.en).replace(/'/g,"\\'")}')">Delete</button>
        </td></tr>`).join('')}
      </table>
    </div>`;
  }
  if(adminTab==='orders'){
    body=`
    <div class="a-panel" style="margin-bottom:22px">
      <h3>Record a sale manually</h3>
      <p class="muted" style="margin-bottom:12px">Website orders are logged automatically. Use this only for sales that happened outside the website (in the shop, direct WhatsApp chat, etc.).</p>
      <div class="a-form-grid">
        <div class="f-group"><label>Customer name</label><input id="mName"></div>
        <div class="f-group"><label>Total (USD)</label><input id="mTotal" type="number" step="0.5"></div>
        <div class="f-group full"><label>Items (free text)</label><input id="mItems" placeholder="e.g. 2 × Tulip Mug, 1 × LUXE Tray"></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="manualSale()">Add sale</button>
    </div>
    <div class="a-panel">
      <h3>Orders (${ORDERS.length})</h3>
      ${ORDERS.length?`<table><tr><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr>
      ${ORDERS.map(o=>`<tr>
        <td>${new Date(o.created_at).toLocaleDateString()}<br><span class="muted">${new Date(o.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></td>
        <td>${esc(o.name)}<br><span class="muted">${esc(o.phone||'')}</span><br><span class="muted">${esc(o.address||'')}</span></td>
        <td>${(o.items||[]).map(i=>`${i.qty} × ${esc(i.name)}`).join('<br>')}</td>
        <td>$${(+o.total).toFixed(2)}</td>
        <td><button class="status ${o.status==='new'?'st-new':o.status==='done'?'st-done':'st-cancel'}" onclick="cycleStatus(${o.id},'${o.status}')">${o.status.toUpperCase()}</button></td>
        <td class="a-actions"><button class="a-del" onclick="deleteOrder(${o.id})">✕</button></td>
      </tr>`).join('')}</table>`:'<p class="muted">No orders yet.</p>'}
    </div>`;
  }

  box.innerHTML=`
    ${DEMO?'<div class="warn-banner">⚠ Demo mode — sample data, changes are not saved. Connect Supabase to go live.</div>':''}
    <div class="admin-head">
      <h1>Zeina — Admin Console</h1>
      <div class="a-bar">
        <button class="btn btn-ghost btn-sm" onclick="exportData()">Backup (download)</button>
        <button class="btn btn-ghost btn-sm" onclick="go('home')">View store</button>
        <button class="btn btn-primary btn-sm" onclick="adminLogout()">Logout</button>
      </div>
    </div>
    ${tabs}${body}`;
}
async function adminLogin(){
  const email=document.getElementById('aEmail').value.trim();
  const pass=document.getElementById('aPass').value;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){toast('Login failed: '+error.message);return}
  SESSION=data.session;renderAdmin();
}
async function adminLogout(){if(!DEMO)await sb.auth.signOut();SESSION=null;renderAdmin();}
async function saveProduct(){
  const en=document.getElementById('fEn').value.trim();
  const ar=document.getElementById('fAr').value.trim();
  const price=parseFloat(document.getElementById('fP').value);
  const category=document.getElementById('fC').value;
  const best=!!document.getElementById('fB').value;
  const image_url=document.getElementById('fImg').value.trim();
  if(!en||isNaN(price)){toast('Name and price are required');return}
  const gpool=['g1','g2','g3','g4','g5'];
  if(DEMO){
    if(editingId!==null){
      const p=DB.find(x=>x.id===editingId);
      Object.assign(p,{en,ar,p:price,c:category,best,i:pickedIcon,img:image_url});
      editingId=null;
    }else{
      const id=Math.max(0,...DB.map(x=>x.id))+1;
      DB.push({id,en,ar,c:category,p:price,best,i:pickedIcon,g:gpool[id%5],img:image_url});
    }
    renderAdmin();toast('Saved ✓ (demo)');return;
  }
  const row={en,ar,price,category,best,icon:pickedIcon,image_url};
  let error;
  if(editingId!==null){
    ({error}=await sb.from('products').update(row).eq('id',editingId));
    editingId=null;
  }else{
    row.gradient=gpool[Math.floor(Math.random()*5)];
    ({error}=await sb.from('products').insert(row));
  }
  if(error){toast('Save failed: '+error.message);return}
  await loadProducts();renderAdmin();toast('Saved ✓');
}
async function deleteProduct(id,name){
  if(!confirm('Delete '+name+'?'))return;
  if(DEMO){DB=DB.filter(x=>x.id!==id);renderAdmin();return;}
  const {error}=await sb.from('products').delete().eq('id',id);
  if(error){toast('Delete failed: '+error.message);return}
  await loadProducts();renderAdmin();
}
async function manualSale(){
  const name=document.getElementById('mName').value.trim()||'Walk-in customer';
  const total=parseFloat(document.getElementById('mTotal').value);
  const itemsTxt=document.getElementById('mItems').value.trim();
  if(isNaN(total)){toast('Enter the total');return}
  if(DEMO){
    demoOrders.unshift({id:++demoIdSeq,created_at:new Date().toISOString(),name,phone:'',address:'',note:'manual entry',
      items:itemsTxt?[{pid:0,name:itemsTxt,qty:1,unit:total}]:[],total,status:'done'});
    renderAdmin();toast('Sale recorded ✓ (demo)');return;
  }
  const {error}=await sb.from('orders').insert({name,phone:'',address:'',note:'manual entry',
    items:itemsTxt?[{pid:0,name:itemsTxt,qty:1,unit:total}]:[],total,status:'done'});
  if(error){toast('Failed: '+error.message);return}
  renderAdmin();toast('Sale recorded ✓');
}
async function cycleStatus(id,cur){
  const next=cur==='new'?'done':cur==='done'?'cancel':'new';
  if(DEMO){const o=demoOrders.find(x=>x.id===id);if(o)o.status=next;renderAdmin();return;}
  const {error}=await sb.from('orders').update({status:next}).eq('id',id);
  if(error){toast('Failed: '+error.message);return}
  renderAdmin();
}
async function deleteOrder(id){
  if(!confirm('Delete this order?'))return;
  if(DEMO){demoOrders=demoOrders.filter(x=>x.id!==id);renderAdmin();return;}
  const {error}=await sb.from('orders').delete().eq('id',id);
  if(error){toast('Failed: '+error.message);return}
  renderAdmin();
}
function exportData(){
  const blob=new Blob([JSON.stringify({products:DB,orders:ORDERS},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='zeina-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

/* ── Router ── */
function go(view,arg){
  VIEW=view;
  ['home','product','checkout','admin'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('hiddenview',v!==view);
  });
  toggleCart(false);
  document.getElementById('siteHeader').style.display = view==='admin'?'none':'';
  document.querySelector('footer').style.display = view==='admin'?'none':'';
  if(view==='home'){
    history.replaceState(null,'',location.pathname);
    renderHome();
    if(arg){setTimeout(()=>{const el=document.getElementById(arg);if(el)el.scrollIntoView({behavior:'smooth'});},60);}
    else window.scrollTo({top:0});
  }
  if(view==='product'){location.hash='product-'+arg;renderProductPage(arg);}
  if(view==='checkout'){location.hash='checkout';renderCheckout();window.scrollTo({top:0});}
  if(view==='admin'){location.hash='admin';renderAdmin();window.scrollTo({top:0});}
}

/* ── Events ── */
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;
  FILTER=c.dataset.c;renderChips();renderProducts();
});
document.getElementById('langToggle').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;LANG=b.dataset.lang;
  document.querySelectorAll('#langToggle button').forEach(x=>x.classList.toggle('on',x===b));
  refresh();
});
document.getElementById('curToggle').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;CUR=b.dataset.cur;
  document.querySelectorAll('#curToggle button').forEach(x=>x.classList.toggle('on',x===b));
  refresh();
});
function refresh(){
  renderStatic();renderCartBadge();renderDrawer();
  if(VIEW==='home')renderHome();
  if(VIEW==='product'){const id=location.hash.replace('#product-','');renderProductPage(id);}
  if(VIEW==='checkout')renderCheckout();
}
const navEl=document.getElementById('navLinks');
document.getElementById('burger').addEventListener('click',()=>navEl.classList.toggle('open'));
navEl.addEventListener('click',()=>navEl.classList.remove('open'));

/* ── Boot ── */
(async function(){
  renderStatic();renderCartBadge();
  if(sb){
    const {data}=await sb.auth.getSession();
    SESSION=data.session||null;
  }
  await loadProducts();
  const h=location.hash;
  if(h==='#admin')go('admin');
  else if(h.startsWith('#product-'))go('product',h.replace('#product-',''));
  else go('home');
})();
</script>
