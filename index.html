<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeina — Home &amp; Kitchen Accessories</title>
<meta name="description" content="Zeina Home & Kitchen Accessories — elegant dinnerware, gold cutlery, coffee sets, serveware and décor in Lebanon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --magenta:#BA1270;--magenta-deep:#8C0D54;--plum:#4A0A30;
  --blush:#FBEFF6;--blush-2:#F6DFEC;--ivory:#FFFBF7;
  --gold:#C29A4B;--gold-soft:#E8D5AC;
  --ink:#33222C;--ink-soft:#7A6470;
  --radius:18px;--shadow:0 10px 30px rgba(140,13,84,.10);
  --ok:#1E9E62;--warn:#D97706;--bad:#DC2626;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:clip;max-width:100%}
html{scroll-behavior:smooth}
body{font-family:'Jost','Tajawal',sans-serif;color:var(--ink);background:var(--ivory);line-height:1.6;overflow-x:hidden;min-width:0}
img{max-width:100%;height:auto;display:block}
html[dir="rtl"] body{font-family:'Tajawal','Jost',sans-serif}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.2}
html[dir="rtl"] h1,html[dir="rtl"] h2,html[dir="rtl"] h3,html[dir="rtl"] h4{font-family:'Tajawal',sans-serif;font-weight:700}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}

/* ── Header ── */
header{position:sticky;top:0;z-index:50;background:rgba(255,251,247,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--blush-2)}
.nav{display:flex;align-items:center;justify-content:space-between;height:80px;gap:12px}
.logo{display:flex;flex-direction:column;line-height:1;flex-shrink:0;cursor:pointer}
.logo .script{font-family:'Parisienne',cursive;font-size:1.9rem;color:var(--magenta);line-height:1.25;display:block}
.logo .sub{font-size:.54rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-top:7px;padding-inline-start:2px}
.nav-links{display:flex;gap:24px;font-size:.86rem;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
html[dir="rtl"] .nav-links{letter-spacing:0;text-transform:none;font-size:.95rem}
.nav-links a{padding:6px 0;border-bottom:2px solid transparent;transition:.25s;cursor:pointer}
.nav-links a:hover{color:var(--magenta);border-color:var(--magenta)}
.nav-right{display:flex;align-items:center;gap:10px}
.toggle{display:flex;border:1.5px solid var(--blush-2);border-radius:999px;overflow:hidden;background:#fff}
.toggle button{border:none;background:transparent;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--ink-soft);transition:.2s;line-height:1.4}
.toggle button.on{background:var(--magenta);color:#fff}
.cart-btn{position:relative;background:var(--magenta);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(186,18,112,.28);transition:.25s}
.cart-btn:hover{background:var(--magenta-deep)}
.cart-btn svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.cart-count{position:absolute;top:-4px;inset-inline-end:-4px;background:var(--gold);color:#fff;font-size:.68rem;font-weight:700;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.burger{display:none;background:none;border:none;cursor:pointer;padding:8px}
.burger span{display:block;width:24px;height:2px;background:var(--magenta);margin:5px 0}

/* ── Buttons / shared ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;border-radius:999px;font-weight:500;letter-spacing:.04em;font-size:.9rem;transition:.25s;cursor:pointer;border:none}
.btn-primary{background:var(--magenta);color:#fff;box-shadow:0 8px 24px rgba(186,18,112,.3)}
.btn-primary:hover{background:var(--magenta-deep);transform:translateY(-2px)}
.btn-ghost{border:1.5px solid var(--magenta);color:var(--magenta);background:transparent}
.btn-ghost:hover{background:var(--magenta);color:#fff}
.btn-sm{padding:9px 18px;font-size:.8rem}
.btn-add{background:var(--magenta);color:#fff;border:none;border-radius:999px;padding:9px 18px;font-size:.8rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.22s}
.btn-add:hover{background:var(--magenta-deep)}
.btn-add.added{background:var(--ok)}
.btn-add.btn-ask{background:#25D366;color:#fff}
.btn-add.btn-ask:hover{background:#128C7E}
.price-ask{font-size:.86em;font-weight:600;color:var(--gold);letter-spacing:.02em}
section{padding:70px 0}
.sec-head{text-align:center;max-width:620px;margin:0 auto 46px}
.sec-head h2{font-size:clamp(1.9rem,3.6vw,2.7rem);color:var(--plum)}
.sec-head h2 em{font-family:'Parisienne',cursive;font-style:normal;color:var(--magenta);font-weight:400}
html[dir="rtl"] .sec-head h2 em{font-family:'Tajawal',sans-serif;font-weight:700}
.sec-head p{color:var(--ink-soft);margin-top:10px}
.divider{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;color:var(--gold)}
.divider::before,.divider::after{content:'';width:56px;height:1px;background:var(--gold-soft)}

/* ── Hero ── */
.hero{position:relative;background:linear-gradient(160deg,var(--blush) 0%,#fff 55%,var(--blush) 100%);padding:80px 0 92px;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center}
.hero-grid > *{min-width:0}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:.74rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:18px}
html[dir="rtl"] .eyebrow{letter-spacing:.05em}
.eyebrow::before{content:'';width:34px;height:1px;background:var(--gold)}
.hero h1{font-size:clamp(2.3rem,5vw,3.9rem);color:var(--plum);margin-bottom:8px}
.hero h1 .script{font-family:'Parisienne',cursive;font-weight:400;color:var(--magenta);font-size:1.25em}
html[dir="rtl"] .hero h1 .script{font-family:'Tajawal',sans-serif;font-size:1em;font-weight:700}
.hero p{color:var(--ink-soft);max-width:46ch;margin:14px 0 30px;font-size:1.05rem}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap}
.hero-visual{position:relative;display:flex;justify-content:center}
.hero-plate{width:min(360px,78%);max-width:100%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0%,var(--blush) 45%,var(--blush-2) 100%);border:1px solid var(--gold-soft);box-shadow:var(--shadow),inset 0 0 0 22px #fff,inset 0 0 0 24px var(--gold-soft);display:flex;align-items:center;justify-content:center;animation:float 7s ease-in-out infinite}
.hero-plate svg{width:52%}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ── Marquee ── */
.bestsellers{background:linear-gradient(180deg,#fff 0%,var(--blush) 100%);padding-bottom:86px}
.marquee{overflow:hidden;position:relative;padding:12px 0;direction:ltr;-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);touch-action:pan-y;user-select:none;-webkit-user-select:none;cursor:grab}
.marquee.dragging{cursor:grabbing}
.marquee.dragging .bs-card{transform:none!important;transition:none}
.track{display:flex;gap:24px;width:max-content;will-change:transform}
@media(prefers-reduced-motion:reduce){.marquee{overflow-x:auto;mask-image:none;-webkit-mask-image:none;cursor:auto}.hero-plate{animation:none}}
.bs-card{width:250px;flex-shrink:0;background:#fff;border-radius:var(--radius);border:1px solid var(--blush-2);box-shadow:var(--shadow);overflow:hidden;transition:.3s;cursor:pointer;min-width:0}
.bs-card:hover{transform:translateY(-6px);border-color:var(--gold-soft)}
.bs-art{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bs-art svg{width:66px;height:66px}
.bs-art img{width:100%;height:100%;object-fit:cover}
.bs-rank{position:absolute;top:12px;inset-inline-start:12px;background:var(--magenta);color:#fff;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:5px 11px;border-radius:999px;z-index:2}
html[dir="rtl"] .bs-rank{letter-spacing:0}
.bs-body{padding:14px 16px 18px}
.bs-body h3{font-size:1.06rem;color:var(--plum);overflow-wrap:break-word}
.bs-body .price{display:block;margin:6px 0 10px;font-weight:600;color:var(--magenta)}

.g1{background:linear-gradient(135deg,#FDECF5,#F7D7E9)}
.g2{background:linear-gradient(135deg,#FBF3E4,#F1E2C4)}
.g3{background:linear-gradient(135deg,#F2EDF9,#E3D9F0)}
.g4{background:linear-gradient(135deg,#EAF4F1,#D5E8E1)}
.g5{background:linear-gradient(135deg,#FDF0EC,#F7DCD2)}

/* ── Categories ── */
.cats{background:#fff}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.cat-card{position:relative;border-radius:var(--radius);padding:28px 24px;border:1px solid var(--blush-2);background:linear-gradient(160deg,#fff,var(--blush));transition:.3s;cursor:pointer;overflow:hidden}
.cat-card:hover{border-color:var(--magenta);transform:translateY(-4px);box-shadow:var(--shadow)}
.cat-card svg{width:42px;height:42px;margin-bottom:12px}
.cat-card h3{font-size:1.25rem;color:var(--plum)}
.cat-card p{font-size:.85rem;color:var(--ink-soft);margin-top:4px}
.cat-card .count{position:absolute;top:18px;inset-inline-end:18px;font-size:.72rem;color:var(--gold);font-weight:600}

/* ── Catalog ── */
.catalog{background:linear-gradient(180deg,var(--blush) 0%,#fff 30%)}
.chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:38px}
.chip{padding:9px 20px;border-radius:999px;border:1.5px solid var(--blush-2);background:#fff;font-size:.84rem;font-weight:500;cursor:pointer;transition:.22s;color:var(--ink-soft)}
.chip:hover{border-color:var(--magenta);color:var(--magenta)}
.chip.active{background:var(--magenta);border-color:var(--magenta);color:#fff}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px}
.prod{background:#fff;border:1px solid var(--blush-2);border-radius:var(--radius);overflow:hidden;transition:.3s;display:flex;flex-direction:column;min-width:0}
.prod:hover{box-shadow:var(--shadow);transform:translateY(-4px);border-color:var(--gold-soft)}
.prod-art{height:140px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
.prod-art svg{width:56px;height:56px}
.prod-art img{width:100%;height:100%;object-fit:cover}
.tag-best{position:absolute;top:10px;inset-inline-end:10px;background:var(--gold);color:#fff;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:4px 10px;border-radius:999px;z-index:2}
html[dir="rtl"] .tag-best{letter-spacing:0}
.prod-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:4px;flex:1}
.prod-body h3{font-size:1.02rem;color:var(--plum);line-height:1.3;cursor:pointer;overflow-wrap:break-word}
.prod-body h3:hover{color:var(--magenta)}
.prod-body .price{font-weight:600;color:var(--magenta);margin-top:2px}
.prod-body .actions{margin-top:auto;padding-top:12px}
.loading{grid-column:1/-1;text-align:center;color:var(--ink-soft);padding:60px 0}
.spinner{width:34px;height:34px;border:3px solid var(--blush-2);border-top-color:var(--magenta);border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Product page ── */
.pd{padding:50px 0 70px}
.crumb{font-size:.82rem;color:var(--ink-soft);margin-bottom:30px}
.crumb a{color:var(--magenta);cursor:pointer}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start}
.pd-visual{border-radius:24px;border:1px solid var(--blush-2);min-height:380px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
.pd-visual svg{width:160px;height:160px}
.pd-img-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.pd-img-wrap img{width:100%;height:100%;object-fit:cover;transition:opacity .22s ease}
.pd-img-wrap img.swap{opacity:0}
.pd-variants{margin:14px 0 4px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.pd-variants-label{font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
html[dir="rtl"] .pd-variants-label{letter-spacing:0}
.v-pills{display:flex;flex-wrap:wrap;gap:8px}
.v-pill{background:#fff;border:1.5px solid var(--blush-2);color:var(--ink);border-radius:999px;padding:8px 16px;font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.18s;min-width:56px}
.v-pill:hover{border-color:var(--gold);color:var(--gold)}
.v-pill.on{background:var(--plum);border-color:var(--plum);color:#fff}
.v-pill.on:hover{color:#fff}
.v-pill:focus-visible{outline:2px solid var(--magenta);outline-offset:2px}
.pd-info{min-width:0}
.pd-info h1{font-size:clamp(1.7rem,3.4vw,2.5rem);color:var(--plum);overflow-wrap:break-word}
.pd-info .ar2{color:var(--ink-soft);margin-top:4px;font-size:1.05rem}
.pd-info .cat-link{display:inline-block;margin-top:12px;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;cursor:pointer}
html[dir="rtl"] .pd-info .cat-link{letter-spacing:0}
.pd-price{font-size:1.9rem;font-weight:600;color:var(--magenta);margin:20px 0 8px;font-family:'Cormorant Garamond',serif}
html[dir="rtl"] .pd-price{font-family:'Tajawal',sans-serif}
.qty{display:inline-flex;align-items:center;border:1.5px solid var(--blush-2);border-radius:999px;overflow:hidden;vertical-align:middle}
.qty button{width:40px;height:44px;border:none;background:#fff;font-size:1.2rem;cursor:pointer;color:var(--magenta)}
.qty button:hover{background:var(--blush)}
.qty span{min-width:36px;text-align:center;font-weight:600}
.pd-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.rail-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
.rail-head h2{font-size:1.5rem;color:var(--plum)}
.rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
.rail-sec{padding:34px 0 8px}

/* ── Cart drawer ── */
.drawer-bg{position:fixed;inset:0;background:rgba(74,10,48,.35);z-index:70;opacity:0;pointer-events:none;transition:.3s}
.drawer-bg.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;bottom:0;inset-inline-end:0;width:min(420px,calc(100% - 22px));background:#fff;z-index:71;box-shadow:-10px 0 40px rgba(0,0,0,.15);transform:translateX(100%);visibility:hidden;transition:transform .32s ease, visibility 0s linear .32s;display:flex;flex-direction:column}
html[dir="rtl"] .drawer{transform:translateX(-100%)}
.drawer.open{transform:translateX(0)!important;visibility:visible;transition:transform .32s ease, visibility 0s linear 0s}
.drawer-head{padding:20px 22px;border-bottom:1px solid var(--blush-2);display:flex;justify-content:space-between;align-items:center}
.drawer-head h3{color:var(--plum);font-size:1.3rem}
.drawer-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink-soft);line-height:1}
.drawer-items{flex:1;overflow-y:auto;padding:16px 22px}
.c-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--blush)}
.c-art{width:62px;height:62px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.c-art svg{width:34px;height:34px}
.c-art img{width:100%;height:100%;object-fit:cover}
.c-info{flex:1;min-width:0}
.c-info h4{font-size:.92rem;color:var(--plum);line-height:1.3}
.c-info .p{color:var(--magenta);font-weight:600;font-size:.88rem;margin-top:2px}
.c-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.c-qty button{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--blush-2);background:#fff;cursor:pointer;color:var(--magenta);font-weight:600}
.c-rm{background:none;border:none;color:var(--bad);cursor:pointer;font-size:.74rem;margin-inline-start:8px}
.drawer-foot{padding:18px 22px;border-top:1px solid var(--blush-2)}
.d-total{display:flex;justify-content:space-between;font-weight:600;font-size:1.06rem;margin-bottom:14px;color:var(--plum)}
.empty{color:var(--ink-soft);text-align:center;padding:40px 10px}

/* ── Checkout ── */
.checkout-card{max-width:640px;margin:0 auto;background:#fff;border:1px solid var(--blush-2);border-radius:24px;padding:40px 34px;box-shadow:var(--shadow)}
.checkout-card h2{color:var(--plum);margin-bottom:20px}
.f-group{margin-bottom:16px}
.f-group label{display:block;font-size:.82rem;font-weight:600;color:var(--plum);margin-bottom:6px}
.f-group input,.f-group textarea,.f-group select{width:100%;padding:12px 14px;border:1.5px solid var(--blush-2);border-radius:12px;font-family:inherit;font-size:.95rem;background:var(--ivory)}
.f-group input:focus,.f-group textarea:focus,.f-group select:focus{outline:none;border-color:var(--magenta)}
.co-summary{background:var(--blush);border-radius:14px;padding:16px 18px;margin:20px 0;font-size:.9rem}
.co-summary .line{display:flex;justify-content:space-between;padding:3px 0}
.co-summary .tot{font-weight:700;color:var(--plum);border-top:1px solid var(--blush-2);margin-top:8px;padding-top:8px}

/* ── About/contact/footer ── */
.about{background:var(--plum);color:#fff;text-align:center}
.about h2{color:#fff;font-size:clamp(1.8rem,3.4vw,2.5rem)}
.about h2 em{font-family:'Parisienne',cursive;font-style:normal;color:var(--gold-soft);font-weight:400}
html[dir="rtl"] .about h2 em{font-family:'Tajawal',sans-serif;font-weight:700}
.about p{color:rgba(255,255,255,.75);max-width:60ch;margin:16px auto 0}
.contact{text-align:center}
.contact-card{max-width:560px;margin:0 auto;background:linear-gradient(160deg,#fff,var(--blush));border:1px solid var(--blush-2);border-radius:24px;padding:44px 34px;box-shadow:var(--shadow)}
.contact-card h2{color:var(--plum);font-size:2rem}
.contact-card p{color:var(--ink-soft);margin:12px 0 26px}
footer{background:var(--plum);color:rgba(255,255,255,.65);padding:34px 0;text-align:center;font-size:.85rem}
footer .script{font-family:'Parisienne',cursive;font-size:1.6rem;color:#fff;display:block;margin-bottom:10px;line-height:1.3}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translate(-50%,80px);background:var(--plum);color:#fff;padding:12px 24px;border-radius:999px;font-size:.88rem;z-index:90;transition:.35s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}

/* ── Admin ── */
.admin{padding:40px 0 80px;background:#F7F2F5;min-height:100vh}
.admin-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:26px}
.admin-head h1{color:var(--plum);font-size:1.8rem}
.a-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.a-tab{padding:9px 20px;border-radius:999px;border:1.5px solid var(--blush-2);background:#fff;font-size:.86rem;font-weight:500;cursor:pointer;color:var(--ink-soft)}
.a-tab.active{background:var(--plum);border-color:var(--plum);color:#fff}
.a-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.a-card{background:#fff;border-radius:16px;padding:20px 22px;border:1px solid var(--blush-2)}
.a-card .v{font-size:1.8rem;font-weight:700;color:var(--magenta);font-family:'Cormorant Garamond',serif}
html[dir="rtl"] .a-card .v{font-family:'Tajawal',sans-serif}
.a-card .l{font-size:.78rem;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase}
.a-panel{background:#fff;border-radius:18px;border:1px solid var(--blush-2);padding:24px;overflow-x:auto}
.a-panel h3{color:var(--plum);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{text-align:start;padding:10px 10px;color:var(--ink-soft);font-weight:600;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;border-bottom:2px solid var(--blush-2)}
td{padding:11px 10px;border-bottom:1px solid var(--blush);vertical-align:middle}
.a-actions button{border:none;background:none;cursor:pointer;font-size:.8rem;font-weight:600;margin-inline-end:10px}
.a-edit{color:var(--magenta)}.a-del{color:var(--bad)}
.status{font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:999px;cursor:pointer;border:none}
.st-new{background:#FEF3C7;color:#92400E}
.st-done{background:#D1FAE5;color:#065F46}
.st-cancel{background:#FEE2E2;color:#991B1B}
.a-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.a-form-grid .full{grid-column:1/-1}
.a-login{max-width:400px;margin:80px auto;background:#fff;padding:40px;border-radius:20px;border:1px solid var(--blush-2);text-align:center;box-shadow:var(--shadow)}
.a-login h2{color:var(--plum);margin-bottom:6px}
.a-login p{color:var(--ink-soft);font-size:.88rem;margin-bottom:20px}
.icon-pick{display:flex;flex-wrap:wrap;gap:8px}
.icon-pick button{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--blush-2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:8px}
.icon-pick button.on{border-color:var(--magenta);background:var(--blush)}
.icon-pick svg{width:100%;height:100%}
.a-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.muted{color:var(--ink-soft);font-size:.82rem}
.warn-banner{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;border-radius:12px;padding:12px 16px;font-size:.85rem;margin-bottom:20px}

.hiddenview{display:none!important}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;overscroll-behavior:contain;-webkit-user-select:none;user-select:none;transition:background .22s ease}
.lightbox.open{display:flex}
.lb-stage{position:relative;width:100%;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:zoom-in}
.lb-stage.zoomed{cursor:grab}
.lb-stage.grabbing{cursor:grabbing}
.lb-img{max-width:100%;max-height:100%;object-fit:contain;transform-origin:50% 50%;will-change:transform;-webkit-user-drag:none;user-drag:none;pointer-events:none}
.lb-img.snap{transition:transform .28s cubic-bezier(.22,.61,.36,1)}
.lb-close{position:absolute;top:14px;inset-inline-end:14px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.14);border:none;color:#fff;font-size:1.7rem;line-height:1;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;transition:.2s;font-family:inherit;padding:0 0 3px}
.lb-close:hover{background:rgba(255,255,255,.28)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.14);border:none;color:#fff;font-size:1.4rem;cursor:pointer;z-index:2;display:none;align-items:center;justify-content:center;transition:.2s}
.lb-nav:hover{background:rgba(255,255,255,.28)}
.lb-nav.prev{inset-inline-start:14px}
.lb-nav.next{inset-inline-end:14px}
.lightbox.has-many .lb-nav{display:flex}
@media(hover:none){.lb-nav{display:none!important}}
.lb-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.4);padding:5px 14px;border-radius:999px;font-size:.86rem;z-index:2;pointer-events:none;letter-spacing:.02em}
.lb-dots{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2;pointer-events:none}
.lb-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);transition:.2s}
.lb-dot.on{background:#fff;transform:scale(1.25)}
.lightbox.single .lb-counter,.lightbox.single .lb-dots{display:none}
.pd-visual{cursor:default}
.pd-visual:has(img){cursor:zoom-in}

/* ── Splash intro ── */
.splash{position:fixed;inset:0;z-index:200;background:radial-gradient(circle at 50% 40%,#FFF5FA 0%,var(--blush) 55%,var(--blush-2) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overscroll-behavior:contain;touch-action:none;will-change:transform;transform:translateY(0);transition:transform .6s cubic-bezier(.22,.61,.36,1)}
.splash.dismissing{transform:translateY(-100%)}
.splash-logo{max-width:min(400px,70vw);max-height:52vh;width:auto;height:auto;opacity:0;transform:scale(.86);animation:splash-in 1.5s cubic-bezier(.22,.61,.36,1) .1s forwards;filter:drop-shadow(0 12px 30px rgba(140,13,84,.14))}
.splash-hint{margin-top:44px;color:var(--plum);font-size:.86rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:splash-fade 1.2s ease .9s forwards}
html[dir="rtl"] .splash-hint{letter-spacing:0;text-transform:none;font-size:.95rem;font-weight:700}
.splash-chevron{width:34px;height:22px;position:relative;animation:splash-bounce 1.6s ease-in-out infinite}
.splash-chevron::before,.splash-chevron::after{content:'';position:absolute;top:8px;width:20px;height:3px;background:var(--magenta);border-radius:2px;transform-origin:100% 50%}
.splash-chevron::before{left:0;transform:rotate(-40deg)}
.splash-chevron::after{right:0;transform:rotate(40deg);transform-origin:0 50%}
.splash-enter{margin-top:22px;padding:12px 28px;border-radius:999px;background:var(--magenta);color:#fff;border:none;font-weight:600;font-size:.9rem;cursor:pointer;box-shadow:0 8px 24px rgba(186,18,112,.28);display:none}
.splash-enter:hover{background:var(--magenta-deep)}
@keyframes splash-in{to{opacity:1;transform:scale(1)}}
@keyframes splash-fade{to{opacity:.9}}
@keyframes splash-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@media(prefers-reduced-motion:reduce){
  .splash{transition:opacity .3s ease}
  .splash.dismissing{transform:none;opacity:0}
  .splash-logo{animation:none;opacity:1;transform:none}
  .splash-hint{animation:none;opacity:.9}
  .splash-chevron{animation:none;display:none}
  .splash-enter{display:inline-block}
}
@media(max-width:520px){
  .splash-logo{max-width:78vw}
  .splash-hint{margin-top:32px;font-size:.78rem}
}
.wa-float{position:fixed;bottom:24px;inset-inline-end:24px;z-index:60;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:.25s}
.wa-float:hover{transform:scale(1.08)}
.wa-float svg{width:28px;height:28px;fill:#fff}

@media(max-width:960px){
  .nav-links{position:fixed;inset:80px 0 auto 0;background:#fff;flex-direction:column;gap:0;padding:10px 0;border-bottom:1px solid var(--blush-2);display:none;z-index:49}
  .nav-links.open{display:flex}
  .nav-links a{padding:14px 24px;border-bottom:none}
  .burger{display:block}
}
@media(max-width:880px){
  .hero-grid,.pd-grid{grid-template-columns:1fr}
  .hero-grid{text-align:center}
  .hero p{margin-inline:auto}
  .hero-actions{justify-content:center}
  .eyebrow::before{display:none}
  .a-form-grid{grid-template-columns:1fr}
  .pd-visual{min-height:280px}
}
@media(max-width:520px){
  .wrap{padding:0 16px}
  section{padding:50px 0}
  .bestsellers{padding-bottom:60px}
  .hero{padding:56px 0 66px}
  .sec-head{margin-bottom:32px;padding:0 16px}
  .drawer-head,.drawer-items,.drawer-foot{padding-inline:16px}
  .checkout-card,.contact-card{padding:28px 20px}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
  .cat-grid{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .rail{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .nav{height:64px;gap:8px}
  .nav-right{gap:6px}
  .toggle button{padding:5px 9px;font-size:.72rem}
  .cart-btn{width:38px;height:38px}
  .cart-btn svg{width:17px;height:17px}
  .logo .script{font-size:1.6rem}
  .logo .sub{font-size:.5rem;letter-spacing:.22em}
  .wa-float{width:48px;height:48px;bottom:18px;inset-inline-end:18px}
  .wa-float svg{width:24px;height:24px}
}

function rowToProduct(r){
  const arr=Array.isArray(r.images)?r.images:(r.image_url?[r.image_url]:[]);
  const images=arr.map(imgSrc).filter(Boolean);
  return {
    id:r.id, sku:r.sku||'', barcode:r.barcode||'',
    en:r.en, ar:r.ar, c:r.category,
    p:(r.price==null||r.price==='')?null:+r.price,
    i:r.icon||'mug', g:r.gradient||'g1',
    best:!!r.best, top:!!r.top_seller,
    images, img:images[0]||'',
    variantGroup:r.variant_group||null,
    variantLabelEn:r.variant_label_en||null,
    variantLabelAr:r.variant_label_ar||null,
    variantOrder:r.variant_order==null?null:+r.variant_order
  };
}
function annotateVariants(list){
  const groups={};
  list.forEach(p=>{if(p.variantGroup)(groups[p.variantGroup]=groups[p.variantGroup]||[]).push(p)});
  Object.values(groups).forEach(grp=>{
    grp.sort((a,b)=>(a.variantOrder||0)-(b.variantOrder||0));
    const primary=grp[0];
    primary.isVariantPrimary=true;
    primary.variants=grp.map(v=>({
      id:v.id, sku:v.sku,
      labelEn:v.variantLabelEn||v.en, labelAr:v.variantLabelAr||v.ar,
      p:v.p, img:v.img||primary.img, images:v.images.length?v.images:primary.images
    }));
    for(let i=1;i<grp.length;i++)grp[i].isVariantChild=true;
  });
  return list;
}
const visibleDB=()=>DB.filter(p=>!p.isVariantChild);

function addToCart(id,qty=1,btn){
  const p=byId(id);
  if(!p||!hasPrice(p.p)){toast(t('contactPrice'));return}
  cart[id]=(cart[id]||0)+qty;saveCart();renderCartBadge();renderDrawer();
  toast(t('toastAdd'));
  if(btn){btn.classList.add('added');const old=btn.innerHTML;btn.innerHTML=t('added');setTimeout(()=>{btn.classList.remove('added');btn.innerHTML=old;},1400);}
}
function setQty(id,q){ if(q<=0)delete cart[id];else cart[id]=q; saveCart();renderCartBadge();renderDrawer(); if(VIEW==='checkout')renderCheckout(); }
function cartCount(){return Object.values(cart).reduce((a,b)=>a+b,0)}
function cartTotal(){return Object.entries(cart).reduce((s,[id,q])=>{const p=byId(id);return (p&&hasPrice(p.p))?s+priceVal(+p.p)*q:s},0)}
function renderCartBadge(){document.getElementById('cartCount').textContent=cartCount()}
function toggleCart(open){
  document.getElementById('drawer').classList.toggle('open',open);
  document.getElementById('drawerBg').classList.toggle('open',open);
  if(open)renderDrawer();
}
function renderDrawer(){

/* ── Best-sellers carousel: rAF loop, pointer drag, momentum, auto-resume ── */
let bsCarousel=null;
function setupBestCarousel(){
  const marquee=document.getElementById('bsMarquee');
  const track=document.getElementById('bsTrack');
  if(!marquee||!track||!track.children.length)return;
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(bsCarousel)bsCarousel.destroy();
  const S={
    x:0, vx:0, autoVx:-0.15, halfW:0,
    dragging:false, startX:0, startY:0, lastX:0, lastT:0, dragDist:0,
    lastFrame:performance.now(), releasedAt:0, released:false,
    dead:false, raf:0, axisLocked:null
  };
  const measure=()=>{
    const kids=track.children;
    const half=Math.floor(kids.length/2);
    if(half<1){S.halfW=0;return}
    S.halfW=kids[half].offsetLeft;
    if(S.halfW>0)S.autoVx=-S.halfW/42000;
  };
  const wrap=()=>{
    if(S.halfW<=0)return;
    while(S.x<=-S.halfW)S.x+=S.halfW;
    while(S.x>0)S.x-=S.halfW;
  };
  const apply=()=>{ track.style.transform=`translate3d(${S.x.toFixed(2)}px,0,0)` };
  const frame=(now)=>{
    if(S.dead)return;
    const dt=Math.min(now-S.lastFrame,50);
    S.lastFrame=now;
    if(!S.dragging){
      if(S.released){
        const idle=now-S.releasedAt;
        if(idle<3000){
          S.vx*=Math.pow(0.94,dt/16.67);
          if(Math.abs(S.vx)<0.005)S.vx=0;
        }else{
          const blend=Math.min(1,dt/500);
          S.vx=S.vx+(S.autoVx-S.vx)*blend;
          if(Math.abs(S.vx-S.autoVx)<0.005){S.vx=S.autoVx;S.released=false}
        }
      }else{
        S.vx=S.autoVx;
      }
      S.x+=S.vx*dt;
      wrap();apply();
    }
    S.raf=requestAnimationFrame(frame);
  };
  const onDown=e=>{
    if(e.pointerType==='mouse'&&e.button!==0)return;
    S.dragging=true;S.axisLocked=null;
    S.startX=e.clientX;S.startY=e.clientY;
    S.lastX=e.clientX;S.lastT=performance.now();
    S.dragDist=0;S.vx=0;
    marquee.classList.add('dragging');
    try{marquee.setPointerCapture(e.pointerId)}catch(_){}
  };
  const onMove=e=>{
    if(!S.dragging)return;
    const dx=e.clientX-S.lastX;
    const totalDx=e.clientX-S.startX;
    const totalDy=e.clientY-S.startY;
    if(S.axisLocked===null){
      if(Math.abs(totalDx)>6||Math.abs(totalDy)>6){
        S.axisLocked=Math.abs(totalDx)>=Math.abs(totalDy)?'x':'y';
      }
    }
    if(S.axisLocked==='y'){
      S.dragging=false;marquee.classList.remove('dragging');
      try{marquee.releasePointerCapture(e.pointerId)}catch(_){}
      return;
    }
    if(S.axisLocked==='x'){
      S.dragDist+=Math.abs(dx);
      S.x+=dx;wrap();apply();
      const now=performance.now();
      const dt=Math.max(now-S.lastT,1);
      S.vx=dx/dt;
      S.lastX=e.clientX;S.lastT=now;
      if(e.cancelable)e.preventDefault();
    }
  };
  const onUp=e=>{
    if(!S.dragging&&S.axisLocked!=='y')return;
    const wasDragging=S.dragging;
    S.dragging=false;
    marquee.classList.remove('dragging');
    try{marquee.releasePointerCapture(e.pointerId)}catch(_){}
    if(wasDragging){
      S.releasedAt=performance.now();
      S.released=true;
      S.vx=Math.max(-3,Math.min(3,S.vx));
    }
  };
  const onClickCapture=e=>{
    if(S.dragDist>10){
      e.stopPropagation();e.stopImmediatePropagation();e.preventDefault();
    }
    S.dragDist=0;
  };
  const onCardClick=e=>{
    const c=e.target.closest('.bs-card');
    if(!c)return;
    const pid=+c.dataset.pid;
    if(pid)go('product',pid);
  };
  marquee.addEventListener('pointerdown',onDown);
  marquee.addEventListener('pointermove',onMove);
  marquee.addEventListener('pointerup',onUp);
  marquee.addEventListener('pointercancel',onUp);
  marquee.addEventListener('click',onClickCapture,true);
  marquee.addEventListener('click',onCardClick);
  const onResize=()=>{const prev=S.halfW;measure();if(prev>0&&S.halfW>0)S.x=S.x*(S.halfW/prev);wrap();apply()};
  window.addEventListener('resize',onResize);
  measure();apply();
  if(!reduced){S.raf=requestAnimationFrame(frame)}
  S.destroy=()=>{
    S.dead=true;cancelAnimationFrame(S.raf);
    marquee.removeEventListener('pointerdown',onDown);
    marquee.removeEventListener('pointermove',onMove);
    marquee.removeEventListener('pointerup',onUp);
    marquee.removeEventListener('pointercancel',onUp);
    marquee.removeEventListener('click',onClickCapture,true);
    marquee.removeEventListener('click',onCardClick);
    window.removeEventListener('resize',onResize);
  };
  bsCarousel=S;
}

function selectVariant(primaryId,ix){
  const p=byId(primaryId); if(!p||!p.variants) return;
  const v=p.variants[ix]; if(!v) return;
  PD_VARIANT_IX=ix;
  document.querySelectorAll('.v-pill').forEach((el,i)=>{el.classList.toggle('on',i===ix);el.setAttribute('aria-checked',i===ix?'true':'false')});
  document.getElementById('pdPrice').innerHTML=fmtPrice(v.p);
  document.getElementById('pdRow').innerHTML=pdCtaHtml(v);
  const img=document.getElementById('pdImg');
  const wrap=document.querySelector('.pd-img-wrap');
  const targetSrc=v.img||p.img;
  if(!targetSrc){ if(img){img.remove();} wrap.innerHTML=(icons[p.i]||icons.mug); return; }
  if(!img){ wrap.innerHTML=`<img id="pdImg" src="${esc(targetSrc)}" alt="" loading="eager">`; return; }
  if(img.getAttribute('src')===targetSrc) return;
  img.classList.add('swap');
  const pre=new Image();
  pre.onload=()=>{ img.src=targetSrc; requestAnimationFrame(()=>img.classList.remove('swap')); };
  pre.onerror=()=>{ img.classList.remove('swap'); };
  pre.src=targetSrc;
}

  startX:0, startY:0, startTx:0, startTy:0, startScale:1, startDist:0, startCx:0, startCy:0,
  mode:null,        // 'swipe' | 'pan' | 'pinch' | null
  swipeDx:0, swipeDy:0,
  lastTap:0, lastTapX:0, lastTapY:0,
  historyPushed:false, popHandler:null, keyHandler:null,
  el:{}, bound:false, transitioning:false
};
function lbEls(){
  if(LB.el.root) return;
  LB.el.root=document.getElementById('lightbox');
  LB.el.stage=document.getElementById('lbStage');
  LB.el.img=document.getElementById('lbImg');
  LB.el.close=document.getElementById('lbClose');
  LB.el.prev=document.getElementById('lbPrev');
  LB.el.next=document.getElementById('lbNext');
  LB.el.counter=document.getElementById('lbCounter');
  LB.el.dots=document.getElementById('lbDots');
}
function openLightbox(imgs, idx){
  lbEls();
  LB.imgs=imgs; LB.idx=Math.max(0,Math.min(idx|0,imgs.length-1));
  LB.scale=1; LB.tx=0; LB.ty=0;
  LB.el.root.classList.add('open');
  LB.el.root.classList.toggle('has-many',imgs.length>1);
  LB.el.root.classList.toggle('single',imgs.length<=1);
  LB.el.root.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  document.documentElement.style.overflow='hidden';
  loadLbImage(LB.idx,false);
  if(!LB.historyPushed){
    try{ history.pushState({lb:true},''); LB.historyPushed=true; }catch(_){}
  }
  bindLb();
  preloadNeighbors();
}
function closeLightbox(fromPop){
  if(!LB.el.root||!LB.el.root.classList.contains('open')) return;
  LB.el.root.classList.remove('open');
  LB.el.root.setAttribute('aria-hidden','true');
  LB.el.root.style.background='';
  document.body.style.overflow='';
  document.documentElement.style.overflow='';
  unbindLb();
  LB.pointers.clear(); LB.mode=null;
  LB.scale=1; LB.tx=0; LB.ty=0; applyLb(false);
  if(LB.historyPushed && !fromPop){
    LB.historyPushed=false;
    try{ history.back(); }catch(_){}
  } else { LB.historyPushed=false; }
}
function loadLbImage(i,slideDir){
  const n=LB.imgs.length;
  LB.idx=((i%n)+n)%n;
  const src=LB.imgs[LB.idx];
  const img=LB.el.img;
  const finalize=()=>{
    img.onload=()=>{
      LB.natW=img.naturalWidth||1; LB.natH=img.naturalHeight||1;
      computeLbFit();
      LB.scale=1; LB.tx=0; LB.ty=0; LB.el.stage.classList.remove('zoomed');
      if(slideDir){
        img.classList.remove('snap');
        img.style.transform=`translate3d(${-slideDir*LB.stageW}px,0,0) scale(1)`;
        void img.offsetWidth;
        img.classList.add('snap');
        img.style.transform='translate3d(0,0,0) scale(1)';
        setTimeout(()=>img.classList.remove('snap'),300);
      } else {
        applyLb(false);
      }
    };
    img.src=src;
  };
  if(slideDir){
    img.classList.add('snap');
    img.style.transform=`translate3d(${slideDir*LB.stageW}px,0,0) scale(1)`;
    setTimeout(finalize,240);
  } else {
    finalize();
  }
  updateLbChrome();
}
function computeLbFit(){
  const r=LB.el.stage.getBoundingClientRect();
  LB.stageW=r.width; LB.stageH=r.height;
  const sx=LB.stageW/LB.natW, sy=LB.stageH/LB.natH;
  const s=Math.min(sx,sy,1);
  LB.fitW=LB.natW*s; LB.fitH=LB.natH*s;
}
function applyLb(smooth){
  const el=LB.el.img;
  if(smooth) el.classList.add('snap'); else el.classList.remove('snap');
  el.style.transform=`translate3d(${LB.tx.toFixed(2)}px,${LB.ty.toFixed(2)}px,0) scale(${LB.scale.toFixed(4)})`;
  if(smooth) setTimeout(()=>el.classList.remove('snap'),300);
}
function clampPan(){
  const w=LB.fitW*LB.scale, h=LB.fitH*LB.scale;
  const maxX=Math.max(0,(w-LB.stageW)/2);
  const maxY=Math.max(0,(h-LB.stageH)/2);
  LB.tx=Math.max(-maxX,Math.min(maxX,LB.tx));
  LB.ty=Math.max(-maxY,Math.min(maxY,LB.ty));
}
function setLbScale(newScale,anchorX,anchorY,smooth){
  newScale=Math.max(1,Math.min(4,newScale));
  const cx=LB.stageW/2, cy=LB.stageH/2;
  const f=newScale/LB.scale;
  LB.tx=(anchorX-cx)*(1-f)+LB.tx*f;
  LB.ty=(anchorY-cy)*(1-f)+LB.ty*f;
  LB.scale=newScale;
  clampPan();
  LB.el.stage.classList.toggle('zoomed',LB.scale>1.02);
  applyLb(!!smooth);
}
function isRTL(){ return document.documentElement.dir==='rtl'; }
function updateLbChrome(){
  if(!LB.el.counter) return;
  const n=LB.imgs.length, i=LB.idx+1;
  LB.el.counter.textContent=`${i} / ${n}`;
  if(LB.el.dots){
    LB.el.dots.innerHTML='';
    if(n>1 && n<=8){
      for(let k=0;k<n;k++){
        const d=document.createElement('span');
        d.className='lb-dot'+(k===LB.idx?' on':'');
        LB.el.dots.appendChild(d);
      }
    }
  }
}
function preloadNeighbors(){
  const n=LB.imgs.length; if(n<=1) return;
  const next=LB.imgs[(LB.idx+1)%n];
  const prev=LB.imgs[(LB.idx-1+n)%n];
  [next,prev].forEach(src=>{ const im=new Image(); im.src=src; });
}
function lbGoto(delta,animate){
  if(LB.imgs.length<=1) return;
  // slide direction of outgoing image: LTR next slides left (-1), prev slides right (+1); RTL mirrored
  const dir = animate ? ((isRTL()?1:-1) * Math.sign(delta)) : 0;
  loadLbImage(LB.idx+delta, dir);
  preloadNeighbors();
}
function lbPointerDown(e){
  if(e.target===LB.el.close||e.target===LB.el.prev||e.target===LB.el.next) return;
  LB.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  try{ LB.el.stage.setPointerCapture(e.pointerId); }catch(_){}
  if(LB.pointers.size===2){
    LB.mode='pinch';
    const [a,b]=[...LB.pointers.values()];
    LB.startDist=Math.hypot(a.x-b.x,a.y-b.y)||1;
    LB.startCx=(a.x+b.x)/2; LB.startCy=(a.y+b.y)/2;
    LB.startScale=LB.scale;
    LB.startTx=LB.tx; LB.startTy=LB.ty;
  } else if(LB.pointers.size===1){
    LB.startX=e.clientX; LB.startY=e.clientY;
    LB.startTx=LB.tx; LB.startTy=LB.ty;
    LB.swipeDx=0; LB.swipeDy=0;
    LB.mode=LB.scale>1.02?'pan':null;   // null means "not decided yet"
  }
}
function lbPointerMove(e){
  const p=LB.pointers.get(e.pointerId); if(!p) return;
  p.x=e.clientX; p.y=e.clientY;
  if(LB.pointers.size===2 && LB.mode==='pinch'){
    const [a,b]=[...LB.pointers.values()];
    const dist=Math.hypot(a.x-b.x,a.y-b.y)||1;
    const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
    const ratio=dist/LB.startDist;
    const newScale=Math.max(1,Math.min(4,LB.startScale*ratio));
    const f=newScale/LB.startScale;
    // Zoom so that the pixel at startCx,startCy moves with the current centroid cx,cy
    LB.tx = cx - LB.stageW/2 - (LB.startCx - LB.stageW/2 - LB.startTx)*f;
    LB.ty = cy - LB.stageH/2 - (LB.startCy - LB.stageH/2 - LB.startTy)*f;
    LB.scale=newScale;
    clampPan();
    LB.el.stage.classList.toggle('zoomed',LB.scale>1.02);
    applyLb(false);
    return;
  }
  if(LB.pointers.size!==1) return;
  const dx=e.clientX-LB.startX, dy=e.clientY-LB.startY;
  if(LB.mode==='pan' || LB.scale>1.02){
    LB.mode='pan';
    LB.tx=LB.startTx+dx; LB.ty=LB.startTy+dy;
    clampPan(); applyLb(false);
    return;
  }
  // scale ~ 1: decide swipe axis after 8px
  if(LB.mode===null){
    if(Math.abs(dx)>8||Math.abs(dy)>8){
      LB.mode=Math.abs(dx)>=Math.abs(dy)?'swipe':'vswipe';
    } else return;
  }
  if(LB.mode==='swipe'){
    LB.swipeDx=dx;
    LB.el.img.style.transform=`translate3d(${dx}px,0,0) scale(1)`;
    return;
  }
  if(LB.mode==='vswipe'){
    LB.swipeDy=dy;
    const opacity=Math.max(.35,1-Math.abs(dy)/500);
    LB.el.root.style.background=`rgba(0,0,0,${.92*opacity})`;
    LB.el.img.style.transform=`translate3d(0,${dy}px,0) scale(${Math.max(.7,1-Math.abs(dy)/1200)})`;
  }
}
function lbPointerUp(e){
  const p=LB.pointers.get(e.pointerId); if(!p){LB.pointers.delete(e.pointerId);return}
  LB.pointers.delete(e.pointerId);
  try{ LB.el.stage.releasePointerCapture(e.pointerId); }catch(_){}
  if(LB.mode==='pinch' && LB.pointers.size<2){
    if(LB.scale<1.05){
      LB.scale=1; LB.tx=0; LB.ty=0;
      LB.el.stage.classList.remove('zoomed');
      applyLb(true);
    }
    LB.mode=LB.scale>1.02?'pan':null;
    // If one finger still down, treat it as a new pan/swipe origin
    if(LB.pointers.size===1){
      const [pp]=[...LB.pointers.values()];
      LB.startX=pp.x; LB.startY=pp.y; LB.startTx=LB.tx; LB.startTy=LB.ty;
    }
    return;
  }
  if(LB.mode==='swipe'){
    const threshold=Math.max(60,LB.stageW*0.18);
    const rtl=isRTL();
    if(Math.abs(LB.swipeDx)>threshold){
      const forward = rtl ? LB.swipeDx>0 : LB.swipeDx<0;
      lbGoto(forward?1:-1,true);
    } else {
      LB.el.img.classList.add('snap');
      LB.el.img.style.transform='translate3d(0,0,0) scale(1)';
      setTimeout(()=>LB.el.img.classList.remove('snap'),280);
    }
  } else if(LB.mode==='vswipe'){
    if(Math.abs(LB.swipeDy)>100){
      closeLightbox(false);
      return;
    }
    LB.el.root.style.background='';
    LB.el.img.classList.add('snap');
    LB.el.img.style.transform='translate3d(0,0,0) scale(1)';
    setTimeout(()=>LB.el.img.classList.remove('snap'),280);
  } else if(LB.mode===null){
    // Tap — check for double-tap
    const now=performance.now();
    const dt=now-LB.lastTap;
    const near=Math.hypot(e.clientX-LB.lastTapX,e.clientY-LB.lastTapY)<40;
    if(dt<320 && near){
      if(LB.scale<1.1) setLbScale(2.5,e.clientX,e.clientY,true);
      else { LB.scale=1; LB.tx=0; LB.ty=0; LB.el.stage.classList.remove('zoomed'); applyLb(true); }
      LB.lastTap=0;
    } else {
      LB.lastTap=now; LB.lastTapX=e.clientX; LB.lastTapY=e.clientY;
    }
  }
  LB.mode=LB.scale>1.02?'pan':null;
}
function lbWheel(e){
  e.preventDefault();
  const factor=Math.exp(-e.deltaY*0.0015);
  const rect=LB.el.stage.getBoundingClientRect();
  setLbScale(LB.scale*factor,e.clientX-rect.left,e.clientY-rect.top,false);
}
function lbKey(e){
  if(e.key==='Escape'){ closeLightbox(false); return; }
  if(LB.imgs.length<=1) return;
  if(e.key==='ArrowLeft')  lbGoto(isRTL()?1:-1,true);
  if(e.key==='ArrowRight') lbGoto(isRTL()?-1:1,true);
}
function lbPopState(){ closeLightbox(true); }
function lbOverlayClick(e){
  if(e.target===LB.el.root||e.target===LB.el.stage){ closeLightbox(false); }
}
function bindLb(){
  if(LB.bound) return; LB.bound=true;
  LB.el.stage.addEventListener('pointerdown',lbPointerDown);
  LB.el.stage.addEventListener('pointermove',lbPointerMove);
  LB.el.stage.addEventListener('pointerup',lbPointerUp);
  LB.el.stage.addEventListener('pointercancel',lbPointerUp);
  LB.el.stage.addEventListener('wheel',lbWheel,{passive:false});
  LB.el.close.addEventListener('click',()=>closeLightbox(false));
  LB.el.root.addEventListener('click',lbOverlayClick);
  LB.el.prev.addEventListener('click',()=>lbGoto(isRTL()?1:-1,true));
  LB.el.next.addEventListener('click',()=>lbGoto(isRTL()?-1:1,true));
  LB.keyHandler=lbKey; window.addEventListener('keydown',LB.keyHandler);
  LB.popHandler=lbPopState; window.addEventListener('popstate',LB.popHandler);
  window.addEventListener('resize',lbOnResize);
}
function unbindLb(){
  if(!LB.bound) return; LB.bound=false;
  LB.el.stage.removeEventListener('pointerdown',lbPointerDown);
  LB.el.stage.removeEventListener('pointermove',lbPointerMove);
  LB.el.stage.removeEventListener('pointerup',lbPointerUp);
  LB.el.stage.removeEventListener('pointercancel',lbPointerUp);
  LB.el.stage.removeEventListener('wheel',lbWheel,{passive:false});
  window.removeEventListener('keydown',LB.keyHandler);
  window.removeEventListener('popstate',LB.popHandler);
  window.removeEventListener('resize',lbOnResize);
}
function lbOnResize(){ computeLbFit(); clampPan(); applyLb(false); }

/* ── Splash intro (once per session, swipe-up dismiss) ── */
const SPLASH_TXT={en:{hint:'Swipe up',enter:'Enter'},ar:{hint:'اسحب للأعلى',enter:'ادخل'}};
function localizeSplash(){
  document.querySelectorAll('[data-splash-txt]').forEach(el=>{
    el.textContent=SPLASH_TXT[LANG][el.dataset.splashTxt]||el.textContent;
  });
}
function initSplash(){
  const el=document.getElementById('splash');
  if(!el) return;
  if(sessionStorage.getItem('zeinaSplashSeen')){ el.remove(); return; }
  localizeSplash();
  const reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  document.documentElement.style.overflow='hidden';
  document.body.style.overflow='hidden';
  let dismissing=false;
  const dismiss=()=>{
    if(dismissing) return; dismissing=true;
    sessionStorage.setItem('zeinaSplashSeen','1');
    el.classList.add('dismissing');
    document.documentElement.style.overflow='';
    document.body.style.overflow='';
    setTimeout(()=>{
      el.remove();
      window.removeEventListener('wheel',onWheel,{passive:true});
      window.removeEventListener('keydown',onKey);
    }, reduced?350:640);
  };
  let dragging=false, startY=0, startT=0, dy=0, lastY=0, lastT=0, vy=0, axis=null;
  const onDown=e=>{
    if(reduced) return;
    dragging=true; axis=null;
    startY=e.clientY; startT=performance.now();
    lastY=e.clientY; lastT=startT; dy=0; vy=0;
    try{ el.setPointerCapture(e.pointerId) }catch(_){}
  };
  const onMove=e=>{
    if(!dragging) return;
    const cy=e.clientY;
    const dxTot=Math.abs(e.clientX-(e.clientX-0));  // not tracking x direction — treat as up-only
    if(axis===null){
      const dyt=cy-startY;
      if(Math.abs(dyt)>6){ axis = dyt<0 ? 'up' : 'down'; }
    }
    if(axis==='down'){ dragging=false; return; }  // don't fight downward pull
    dy=cy-startY;
    if(dy>0) dy*=0.35;    // rubber-band if pulled downward
    const t=Math.min(dy,0);
    el.style.transition='none';
    el.style.transform=`translateY(${t}px)`;
    const now=performance.now();
    const dt=Math.max(now-lastT,1);
    vy=(cy-lastY)/dt;
    lastY=cy; lastT=now;
    e.preventDefault?.();
  };
  const onUp=e=>{
    if(!dragging) return;
    dragging=false;
    try{ el.releasePointerCapture(e.pointerId) }catch(_){}
    const h=window.innerHeight||600;
    el.style.transition='';
    const swipedFar = dy < -h*0.25;
    const swipedFast = vy < -0.6;
    if(swipedFar||swipedFast) dismiss();
    else el.style.transform='translateY(0)';
  };
  const onWheel=e=>{ if(reduced||dismissing) return; if(e.deltaY!==0) dismiss(); };
  const onKey=e=>{ if(dismissing) return; if(e.key==='Tab') return; dismiss(); };
  const onClick=e=>{
    if(dismissing) return;
    if(reduced && e.target.id!=='splashEnter') return;
    dismiss();
  };
  el.addEventListener('pointerdown',onDown);
  el.addEventListener('pointermove',onMove);
  el.addEventListener('pointerup',onUp);
  el.addEventListener('pointercancel',onUp);
  el.addEventListener('click',onClick);
  window.addEventListener('wheel',onWheel,{passive:true});
  window.addEventListener('keydown',onKey);
}

/* ── Boot ── */
(async function(){
  initSplash();
  renderStatic();renderCartBadge();
  if(sb){
    const {data}=await sb.auth.getSession();
    SESSION=data.session||null;
  }
  await loadProducts();
  const h=location.hash;
  if(h==='#admin'){window.location.href='./admin.html';return;}
  if(h.startsWith('#product-'))go('product',h.replace('#product-',''));
  else go('home');
})();
</script>
