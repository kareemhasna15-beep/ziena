<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Zeina — Admin</title>
<link rel="icon" type="image/png" href="assets/zeina-logo-icon.png">
<link rel="apple-touch-icon" href="assets/zeina-logo-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Jost:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{
  --magenta:#BA1270;--magenta-deep:#8C0D54;--plum:#4A0A30;
  --blush:#FBEFF6;--blush-2:#F6DFEC;
  --gold:#C29A4B;--ink:#33222C;--ink-soft:#7A6470;
  --bg:#F4EEF2;--card:#fff;--bad:#DC2626;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:clip;max-width:100%}
body{font-family:'Jost','Tajawal',sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;min-height:100vh;min-width:0}
img{max-width:100%;height:auto;display:block}
button,input,select{font-family:inherit}
a{color:inherit;text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px}

/* topbar */
.topbar{background:var(--plum);color:#fff;position:sticky;top:0;z-index:10}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand .script{font-family:'Parisienne',cursive;font-size:1.7rem;color:#fff}
.brand .tag{font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:700}
.top-actions{display:flex;gap:8px;align-items:center}
.tbtn{border:1px solid rgba(255,255,255,.28);background:transparent;color:#fff;border-radius:999px;padding:7px 16px;font-size:.8rem;font-weight:500;cursor:pointer;transition:.2s}
.tbtn:hover{background:rgba(255,255,255,.12)}
.tbtn.solid{background:var(--magenta);border-color:var(--magenta)}
.tbtn.solid:hover{background:var(--magenta-deep)}

/* layout */
main{padding:26px 0 70px}
.warn-banner{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;border-radius:12px;padding:12px 16px;font-size:.85rem;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:9px 22px;border-radius:999px;border:1.5px solid var(--blush-2);background:#fff;font-size:.86rem;font-weight:600;cursor:pointer;color:var(--ink-soft);transition:.2s}
.tab.active{background:var(--plum);border-color:var(--plum);color:#fff}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border-radius:16px;padding:18px 20px;border:1px solid var(--blush-2)}
.kpi .v{font-size:1.9rem;font-weight:700;color:var(--magenta)}
.kpi .l{font-size:.74rem;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.panel{background:var(--card);border-radius:16px;border:1px solid var(--blush-2);padding:22px;overflow-x:auto;margin-bottom:20px}
.panel h3{color:var(--plum);margin-bottom:14px;font-size:1.05rem}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{text-align:left;padding:9px 10px;color:var(--ink-soft);font-weight:700;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;border-bottom:2px solid var(--blush-2);white-space:nowrap}
td{padding:10px;border-bottom:1px solid var(--blush);vertical-align:top}
tr:hover td{background:#FDF8FB}
.muted{color:var(--ink-soft);font-size:.8rem}
.status{font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:999px;cursor:pointer;border:none}
.st-new{background:#FEF3C7;color:#92400E}
.st-done{background:#D1FAE5;color:#065F46}
.st-cancel{background:#FEE2E2;color:#991B1B}
.act{border:none;background:none;cursor:pointer;font-size:.78rem;font-weight:700;margin-right:10px}
.act.edit{color:var(--magenta)}.act.del{color:var(--bad)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border-radius:999px;font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:.2s}
.btn-p{background:var(--magenta);color:#fff}
.btn-p:hover{background:var(--magenta-deep)}
.btn-g{border:1.5px solid var(--magenta);color:var(--magenta);background:transparent}
.btn-g:hover{background:var(--blush)}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:.76rem;font-weight:700;color:var(--plum);margin-bottom:5px;letter-spacing:.03em}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--blush-2);border-radius:10px;font-size:.92rem;background:#FDFBFC}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--magenta)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .full{grid-column:1/-1}
.icon-pick{display:flex;flex-wrap:wrap;gap:7px}
.icon-pick button{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--blush-2);background:#fff;cursor:pointer;padding:7px}
.icon-pick button.on{border-color:var(--magenta);background:var(--blush)}
.icon-pick svg{width:100%;height:100%}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--plum),#2E0620)}
.login-card{width:min(400px,92vw);background:#fff;border-radius:22px;padding:42px 36px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-card .script{font-family:'Parisienne',cursive;font-size:2.6rem;color:var(--magenta);line-height:1.3;display:block}
.login-card .tag{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700;display:block;margin-bottom:26px}
.login-card h2{color:var(--plum);font-size:1.15rem;font-weight:600;margin-bottom:18px}
.toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,80px);background:var(--plum);color:#fff;padding:12px 24px;border-radius:999px;font-size:.86rem;z-index:90;transition:.3s;opacity:0}
.toast.show{transform:translate(-50%,0);opacity:1}
@media(max-width:760px){.fgrid{grid-template-columns:1fr}.topbar .brand .tag{display:none}}

/* import + image management */
.dropzone{border:2px dashed var(--blush-2);border-radius:16px;padding:34px 20px;text-align:center;background:#FDFBFC;transition:.2s;cursor:pointer;color:var(--ink-soft)}
.dropzone.on{border-color:var(--magenta);background:var(--blush);color:var(--plum)}
.dropzone strong{color:var(--plum);font-size:1.05rem;display:block;margin-bottom:6px}
.dropzone .sm{font-size:.78rem}
.parse-summary{background:var(--blush);border:1px solid var(--blush-2);border-radius:12px;padding:16px 18px;margin-bottom:18px;font-size:.86rem}
.parse-summary .row{display:flex;gap:14px;flex-wrap:wrap}
.parse-summary b{color:var(--plum)}
.import-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.import-toolbar .counter{margin-inline-start:auto;color:var(--ink-soft);font-size:.82rem;font-weight:600}
.review-card{border:1.5px solid var(--blush-2);border-radius:14px;padding:14px;margin-bottom:12px;display:grid;grid-template-columns:110px 1fr auto;gap:14px;background:#fff}
.review-card.new{border-left:4px solid #22C55E}
.review-card.update{border-left:4px solid #EAB308}
.review-card.skipped{opacity:.45}
.review-card.done{opacity:.55;background:#F5FFF8}
.review-thumb{width:110px;height:110px;border-radius:10px;background:var(--blush);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--ink-soft);font-size:.72rem;position:relative}
.review-thumb img{width:100%;height:100%;object-fit:cover}
.review-thumb.no-photo::after{content:'no photo'}
.review-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.review-body .fg{margin:0}
.review-body input,.review-body select{padding:8px 10px;font-size:.84rem}
.review-badge{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;margin-bottom:6px}
.review-badge.new{background:#DCFCE7;color:#166534}
.review-badge.update{background:#FEF9C3;color:#854D0E}
.review-badge.error{background:#FEE2E2;color:#991B1B}
.review-actions{display:flex;flex-direction:column;gap:6px;align-items:stretch;justify-content:center;min-width:110px}
.review-actions .btn{padding:8px 14px;font-size:.78rem;justify-content:center}
.review-actions .btn.skip{background:transparent;border:1.5px solid var(--blush-2);color:var(--ink-soft)}
.review-actions .btn.skip:hover{border-color:var(--bad);color:var(--bad)}
.review-diff{font-size:.72rem;color:var(--ink-soft);margin-top:6px}
.review-diff .k{color:var(--plum);font-weight:600}
.review-diff s{color:#dc2626}

.img-manage{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.img-tile{position:relative;width:96px;height:96px;border-radius:10px;overflow:hidden;border:1.5px solid var(--blush-2);background:var(--blush);cursor:move;user-select:none}
.img-tile img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.img-tile.dragging{opacity:.4}
.img-tile.drop-target{outline:2px dashed var(--magenta);outline-offset:-2px}
.img-tile .badge-main{position:absolute;top:4px;inset-inline-start:4px;background:var(--magenta);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:6px}
.img-tile .rm{position:absolute;top:4px;inset-inline-end:4px;background:rgba(0,0,0,.6);color:#fff;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:.9rem;line-height:1;padding:0;display:flex;align-items:center;justify-content:center}
.img-add{width:96px;height:96px;border-radius:10px;border:2px dashed var(--blush-2);background:transparent;color:var(--ink-soft);font-size:.78rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:.2s}
.img-add:hover{border-color:var(--magenta);color:var(--magenta);background:var(--blush)}
.img-add.on{border-color:var(--magenta);background:var(--blush)}
.img-add span{font-size:1.4rem;line-height:1}

.err-list{background:#FEF2F2;border:1px solid #FCA5A5;color:#991B1B;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:.82rem}
.err-list ul{margin:6px 0 0 18px}
.import-diag{font-size:.78rem;color:var(--ink-soft);margin-top:10px;font-family:'SFMono-Regular',ui-monospace,monospace}

/* full-page product editor */
.edit-modal{position:fixed;inset:0;z-index:120;display:none;flex-direction:column;background:rgba(74,10,48,.55);backdrop-filter:blur(6px)}
.edit-modal.open{display:flex}
.edit-modal-panel{background:var(--card);width:min(880px,100%);max-height:100%;margin:auto;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.35)}
@media(max-width:640px){.edit-modal{padding:0}.edit-modal-panel{border-radius:0;width:100%;height:100%;max-height:100%}}
.edit-modal-head{background:var(--plum);color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.edit-modal-head h2{font-size:1.05rem;font-weight:600;color:#fff;margin:0}
.edit-modal-head .sub{font-size:.72rem;letter-spacing:.06em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:2px}
.edit-modal-close{background:transparent;border:none;color:#fff;font-size:1.8rem;line-height:1;cursor:pointer;padding:0 6px;transition:.2s}
.edit-modal-close:hover{color:var(--gold)}
.edit-modal-body{flex:1;overflow-y:auto;padding:22px}
.edit-modal-foot{padding:14px 22px;border-top:1px solid var(--blush-2);background:#FDF8FB;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.edit-modal-foot .status{color:var(--ink-soft);font-size:.82rem;margin-inline-end:auto}
.edit-modal-foot .status.saved{color:#22C55E;font-weight:600}
.edit-modal-foot .status.err{color:var(--bad);font-weight:600}

.slot-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:8px}
@media(max-width:640px){.slot-row{grid-template-columns:repeat(3,minmax(0,1fr))}}
.pslot{position:relative;aspect-ratio:1;border-radius:12px;background:var(--blush);border:1.5px dashed var(--blush-2);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;user-select:none}
.pslot:hover{border-color:var(--magenta);background:var(--blush-2)}
.pslot.filled{border-style:solid;background:#fff;cursor:move}
.pslot.filled:hover{border-color:var(--gold-soft)}
.pslot img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.pslot .empty{color:var(--ink-soft);font-size:.72rem;text-align:center;padding:0 4px;pointer-events:none}
.pslot .empty span{display:block;font-size:1.6rem;color:var(--magenta);margin-bottom:2px}
.pslot .badge{position:absolute;top:6px;inset-inline-start:6px;background:rgba(74,10,48,.85);color:#fff;font-size:.62rem;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:.04em}
.pslot .size-badge{position:absolute;top:6px;inset-inline-end:6px;background:var(--gold);color:#fff;font-size:.62rem;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:.04em}
.pslot .rm{position:absolute;bottom:6px;inset-inline-end:6px;background:rgba(0,0,0,.65);color:#fff;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:.9rem;line-height:1;padding:0;display:flex;align-items:center;justify-content:center}
.pslot .rm:hover{background:var(--bad)}
.pslot.dragging{opacity:.4}
.pslot.drop-target{outline:2px dashed var(--magenta);outline-offset:-2px}
.slot-caption{font-size:.72rem;color:var(--ink-soft);text-align:center;font-weight:600;margin-top:2px;letter-spacing:.04em}

.size-toggle{display:flex;align-items:center;gap:12px;background:var(--blush);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.size-toggle-info{flex:1;font-size:.86rem}
.size-toggle-info b{color:var(--plum)}
.size-toggle-info .muted{color:var(--ink-soft);font-size:.76rem;margin-top:2px}
.size-switch{position:relative;display:inline-block;width:52px;height:28px;flex-shrink:0}
.size-switch input{opacity:0;width:0;height:0}
.size-switch .slider{position:absolute;cursor:pointer;inset:0;background:#e0d0d8;border-radius:999px;transition:.2s}
.size-switch .slider::before{position:absolute;content:'';height:22px;width:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.size-switch input:checked + .slider{background:var(--magenta)}
.size-switch input:checked + .slider::before{transform:translateX(24px)}

.size-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
@media(max-width:520px){.size-grid{grid-template-columns:1fr}}
.size-card{border:1.5px solid var(--blush-2);border-radius:12px;padding:12px}
.size-card.active{border-color:var(--magenta);background:#FDF8FB}
.size-card h4{font-size:.86rem;color:var(--plum);margin-bottom:8px;display:flex;justify-content:space-between}
.size-card h4 .lbl-ar{color:var(--ink-soft);font-size:.78rem;font-weight:500}
.size-card input{width:100%;padding:9px 11px;border:1.5px solid var(--blush-2);border-radius:8px;background:#fff;font-size:.9rem}
.size-card input:focus{outline:none;border-color:var(--magenta)}
.size-card .hint{font-size:.68rem;color:var(--ink-soft);margin-top:4px}
.real-variant-notice{background:#FEF3C7;border:1px solid #FDE68A;color:#92400E;border-radius:10px;padding:10px 12px;font-size:.8rem;margin-bottom:12px}

.edit-section{margin-bottom:22px}
.edit-section h3{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--plum);font-weight:700;margin-bottom:10px;border-bottom:1px solid var(--blush-2);padding-bottom:6px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<div class="edit-modal" id="editModal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="edit-modal-panel">
    <div class="edit-modal-head">
      <div>
        <h2 id="editModalTitle">Edit product</h2>
        <div class="sub" id="editModalSub"></div>
      </div>
      <button class="edit-modal-close" type="button" onclick="closeEditModal()" aria-label="Close">×</button>
    </div>
    <div class="edit-modal-body" id="editModalBody"></div>
    <div class="edit-modal-foot">
      <div class="status" id="editModalStatus"></div>
      <button class="btn btn-g" type="button" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-p" type="button" onclick="saveEditModal()">Save changes</button>
    </div>
  </div>
</div>

function kpis(){
  const done=ORDERS.filter(o=>o.status==='done');
  const revenue=done.reduce((s,o)=>s+(+o.total),0);
  const today=new Date().toDateString();
  const todayOrders=ORDERS.filter(o=>new Date(o.created_at).toDateString()===today).length;
  return {revenue,newCount:ORDERS.filter(o=>o.status==='new').length,todayOrders};
}

/* ── Analytics ── */
function analyticsData(){
  const since=new Date();since.setHours(0,0,0,0);since.setDate(since.getDate()-(A_RANGE-1));
  const done=ORDERS.filter(o=>o.status==='done'&&new Date(o.created_at)>=since);
  /* day buckets */
  const days=[];const rev={};const units={};
  for(let i=0;i<A_RANGE;i++){
    const d=new Date(since);d.setDate(since.getDate()+i);
    const key=d.toISOString().slice(0,10);
    days.push(key);rev[key]=0;units[key]=0;
  }
  const perItem={};
  let totalRev=0,totalUnits=0,orderCount=0;
  done.forEach(o=>{
    const key=new Date(o.created_at).toISOString().slice(0,10);
    if(!(key in rev))return;
    let orderRev=0,orderUnits=0,touches=false;
    (o.items||[]).forEach(it=>{
      const q=+it.qty||0,u=+it.unit||0;
      perItem[it.name]=(perItem[it.name]||{units:0,rev:0});
      perItem[it.name].units+=q;perItem[it.name].rev+=q*u;
      if(A_PROD==='all'||it.name===A_PROD){orderRev+=q*u;orderUnits+=q;touches=true;}
    });
    if(A_PROD==='all'){orderRev=+o.total||orderRev;} /* trust order total when viewing all */
    if(touches||A_PROD==='all'){
      rev[key]+=orderRev;units[key]+=orderUnits;
      totalRev+=orderRev;totalUnits+=orderUnits;orderCount++;
    }
  });

let liveChannel=null,unseen=0,pollTimer=null,lastMaxId=0;
function maxOrderId(){return ORDERS.reduce((m,o)=>Math.max(m,+o.id||0),0)}
function notifyNewOrder(o){
  beep();
  toast('🛎 New order from '+((o&&o.name)||'customer')+(o&&o.total?' — $'+(+o.total).toFixed(2):''));
  try{
    if('Notification' in window && Notification.permission==='granted')
      new Notification('Zeina — New order! 🛎',{body:((o&&o.name)||'Customer')+(o&&o.total?' · $'+(+o.total).toFixed(2):'')+(o&&o.address?' · '+o.address:'')});
  }catch(e){}
  if(document.hidden){unseen++;document.title='('+unseen+') New order — Zeina Admin';}
}
function startLiveOrders(){
  if(DEMO)return;
  lastMaxId=maxOrderId();
  try{ if('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){}
  /* realtime (instant) */
  if(!liveChannel){
    liveChannel=sb.channel('orders-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'orders'},async payload=>{
        notifyNewOrder(payload.new||{});
        await loadAll();lastMaxId=maxOrderId();render();
      }).subscribe();
  }
  /* polling fallback (every 30s) — guarantees updates even if realtime is unavailable */
  if(!pollTimer){
    pollTimer=setInterval(async()=>{
      const prev=lastMaxId;
      await loadAll();
      const nowMax=maxOrderId();
      if(nowMax>prev){
        const newest=ORDERS.find(o=>+o.id===nowMax);
        notifyNewOrder(newest);
        render();
      }
      lastMaxId=nowMax;
    },30000);
  }
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden){unseen=0;document.title='Zeina — Admin';} });
}
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const play=(f,t0,d)=>{const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;o.type='sine';o.connect(g);g.connect(ctx.destination);
      g.gain.setValueAtTime(.25,ctx.currentTime+t0);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t0+d);
      o.start(ctx.currentTime+t0);o.stop(ctx.currentTime+t0+d);};
    play(880,0,.18);play(1174,.16,.24);
  }catch(e){}
}
/* ══════════ Image compression + upload ══════════ */
async function loadImageFromBlob(blob){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(blob);
    const im=new Image();
    im.onload=()=>{ URL.revokeObjectURL(url); resolve(im); };
    im.onerror=e=>{ URL.revokeObjectURL(url); reject(e); };
    im.src=url;
  });
}
async function compressImage(file,maxDim=1600,quality=0.82){
  try{
    const im=await loadImageFromBlob(file);
    let w=im.naturalWidth,h=im.naturalHeight;
    const scale=Math.min(1,maxDim/Math.max(w,h));
    w=Math.round(w*scale); h=Math.round(h*scale);
    const cv=document.createElement('canvas');
    cv.width=w; cv.height=h;
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,w,h);
    ctx.drawImage(im,0,0,w,h);
    return await new Promise(res=>cv.toBlob(res,'image/jpeg',quality));
  }catch(e){ return file; /* fall back to raw */ }
}
function slugSku(sku){ return (sku||'unknown').replace(/[^a-zA-Z0-9._-]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)||'p'; }
async function uploadProductImage(file,sku){
  if(!sb) throw new Error('Not connected');
  const blob=await compressImage(file);
  const safe=slugSku(sku);
  const path=`${safe}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
  const {data,error}=await sb.storage.from('product-images').upload(path,blob,{contentType:'image/jpeg',upsert:false});
  if(error) throw error;
  const {data:pub}=sb.storage.from('product-images').getPublicUrl(data.path);
  return pub.publicUrl;
}

/* ══════════ Parser ══════════ */
const NAME_KEYS={
  sku:['sku','sku/code','code','item code'],
  barcode:['barcode','ean','upc'],
  en:['name (english)','name english','english name','en name','name en','name','product'],
  ar:['name (arabic)','name arabic','arabic name','ar name','name ar'],
  category:['category','sub category','sub-category'],
  price:['retail price','retail','price','price (usd)','usd retail'],
  cost:['cost (usd)','cost','cost usd','purchase price'],
  desc_en:['description','description (english)','description en','desc','desc en','english description'],
  desc_ar:['description (arabic)','description ar','desc ar','arabic description']
};
function matchKey(header,alts){
  const h=String(header||'').toLowerCase().trim().replace(/\s+/g,' ');
  return alts.some(a=>h===a||h.replace(/[()]/g,'').trim()===a);
}
function findHeaderRow(rowsAOA){
  for(let i=0;i<Math.min(6,rowsAOA.length);i++){
    const cells=rowsAOA[i]||[];
    for(const c of cells){
      if(matchKey(c,NAME_KEYS.sku)) return i;
    }
  }
  return -1;
}
function mapHeaders(headerRow){
  const map={};
  headerRow.forEach((h,ix)=>{
    for(const [k,alts] of Object.entries(NAME_KEYS)){
      if(matchKey(h,alts)){ if(map[k]==null) map[k]=ix; }
    }
  });
  return map;
}
async function extractXlsxImages(file){
  /* Best-effort: read xl/media/*, xl/drawings/*.xml, and _rels to map images to spreadsheet rows */
  const out={ byRow:{}, all:[] };
  try{
    const zip=await JSZip.loadAsync(file);
    const mediaKeys=Object.keys(zip.files).filter(n=>/^xl\/media\/image/i.test(n));
    const media={}; // relId? no — just filename base to blob url
    for(const k of mediaKeys){
      const blob=await zip.files[k].async('blob');
      const url=URL.createObjectURL(blob);
      const base=k.split('/').pop();
      media[base]=url;
      out.all.push(url);
    }
    // Read drawing xml files
    const drawingXmls=Object.keys(zip.files).filter(n=>/^xl\/drawings\/drawing\d+\.xml$/i.test(n));
    for(const dn of drawingXmls){
      const xml=await zip.files[dn].async('string');
      const rn = dn.replace('drawings/','drawings/_rels/')+'.rels';
      let relsXml=''; try{ if(zip.files[rn]) relsXml=await zip.files[rn].async('string'); }catch(_){}
      // Parse rels: id -> media filename
      const relMap={};
      relsXml.replace(/<Relationship[^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/g,(_,id,tgt)=>{
        const base=tgt.split('/').pop(); relMap[id]=base; return '';
      });
      // Parse anchors: xdr:from row + rEmbed id
      const anchorRe=/<xdr:(?:oneCellAnchor|twoCellAnchor|absoluteAnchor)[\s\S]*?<\/xdr:(?:oneCellAnchor|twoCellAnchor|absoluteAnchor)>/g;
      const matches=xml.match(anchorRe)||[];
      for(const a of matches){
        const rowM=a.match(/<xdr:from>[\s\S]*?<xdr:row>(\d+)<\/xdr:row>/);
        const idM=a.match(/r:embed="([^"]+)"/);
        if(rowM && idM){
          const zeroBasedRow=+rowM[1];
          const embed=idM[1];
          const media=relMap[embed];
          if(media && !out.byRow[zeroBasedRow]) out.byRow[zeroBasedRow]=media;
        }
      }
    }
    out.media=media;
  }catch(e){
    console.warn('image extraction failed:',e);
  }
  return out;
}
async function parseImportFile(file){
  toast('Parsing…');
  const name=file.name.toLowerCase();
  const ext=name.split('.').pop();
  let workbook;
  try{
    const buf=await file.arrayBuffer();
    workbook=XLSX.read(buf,{type:'array',cellDates:false});
  }catch(e){ toast('Could not open file: '+e.message); return; }
  const sheetName = workbook.SheetNames.includes('Products') ? 'Products' : workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const aoa = XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:''});
  const hRow = findHeaderRow(aoa);
  if(hRow<0){ toast('Could not find a header row with SKU/Code'); return; }
  const headers = aoa[hRow];
  const cols = mapHeaders(headers);
  const missing=['sku','en'].filter(k=>cols[k]==null);
  const layout = hRow===0 ? 'plain (headers row 1)' : `Zeina layout (headers row ${hRow+1})`;
  const dataRows = aoa.slice(hRow+1).filter(r=>r.some(c=>String(c||'').trim()!==''));

  // Image extraction from xlsx (best-effort)
  let imgExtract={byRow:{},media:{}};
  if(ext==='xlsx'){ imgExtract=await extractXlsxImages(file); }

  IMPORT.rows=[]; IMPORT.errors=[]; IMPORT.fallbackImgs={};
  const seenSku=new Map();
  let dupCount=0, newCount=0, updateCount=0, imgMatched=0;
  const existingBySku={};
  PRODUCTS.forEach(p=>{ if(p.sku) existingBySku[String(p.sku).trim()]=p; });

  dataRows.forEach((row,ix)=>{
    const get=k=>{ const c=cols[k]; return c==null?'':String(row[c]||'').trim(); };
    const rid='r'+ix;
    const sku=get('sku');
    const en=get('en');
    const ar=get('ar');
    if(!sku && !en){ IMPORT.errors.push(`Row ${hRow+2+ix}: no SKU and no name`); return; }
    if(!en && !ar){ IMPORT.errors.push(`Row ${hRow+2+ix} (SKU ${sku||'—'}): no name in either language`); return; }
    if(sku && seenSku.has(sku)){
      dupCount++;
      IMPORT.errors.push(`Row ${hRow+2+ix}: duplicate SKU ${sku} — merged with first occurrence`);
      // merge: fill any blank fields into first
      const first=seenSku.get(sku);
      ['en','ar','barcode','category','sub_category'].forEach(k=>{ if(!first[k]&&get(k)) first[k]=get(k); });
      return;
    }
    const priceRaw=get('price'); const price = priceRaw===''?null:parseFloat(priceRaw);
    const costRaw=get('cost'); const cost_usd = costRaw===''?null:parseFloat(costRaw);
    // Category detection: xlsx has 17 fine categories → sub_category; site coarse category best-guess.
    const rawCat=get('category');
    const coarse = mapToCoarseCategory(rawCat, en);
    const dataRowNumInSheet = hRow + 1 + ix; // zero-based
    const imgFromXlsx = imgExtract.byRow[dataRowNumInSheet];
    const imgUrlPreview = imgFromXlsx ? imgExtract.media[imgFromXlsx] : null;
    if(imgUrlPreview) imgMatched++;
    const existing = sku ? existingBySku[sku] : null;
    const mode = existing ? 'update' : 'new';
    if(mode==='update') updateCount++; else newCount++;
    const r={
      rid,
      sku, en, ar,
      barcode: get('barcode'),
      category: coarse,
      sub_category: rawCat || (existing?existing.sub_category:''),
      description_en: get('desc_en') || (existing?existing.description_en:'') || '',
      description_ar: get('desc_ar') || (existing?existing.description_ar:'') || '',
      price: (price!=null && !isNaN(price)) ? price : null,
      cost_usd: (cost_usd!=null && !isNaN(cost_usd)) ? cost_usd : null,
      imgPreview: imgUrlPreview,
      imgBlobKey: imgFromXlsx || null,
      mediaBlobUrls: imgExtract.media,
      mode, existing, status:'pending'
    };
    IMPORT.rows.push(r);
    if(sku) seenSku.set(sku, r);
  });

  IMPORT.summary={
    layout, total:IMPORT.rows.length, newCount, updateCount, imgMatched, dupCount, missing
  };
  toast(`Parsed ${IMPORT.rows.length} rows`);
  render();
}
function mapToCoarseCategory(sub,name){
  const s=String(sub||'').toLowerCase();
  const n=String(name||'').toLowerCase();
  if(/plates?|dinnerware/.test(s)) return 'dinner';
  if(/coffee|tea/.test(s)) return 'coffee';
  if(/mug|glassware|drinkware|jug|bottle|thermos/.test(s)) return 'drink';
  if(/cutlery|spoon|fork|knife/.test(s)) return 'cutlery';
  if(/tray|bowl|serve/.test(s)) return 'serve';
  if(/tissue/.test(s)) return 'tissue';
  if(/storage|jar|fridge|kitchen tool/.test(s)) return 'kitchen';
  if(/lamp|mirror|vase|decor|basket|organizer/.test(s)) return 'decor';
  if(/mug/.test(n)) return 'drink';
  if(/plate|dinner/.test(n)) return 'dinner';
  if(/tissue/.test(n)) return 'tissue';
  return 'decor';
}
function importReset(){ IMPORT={ rows:[], summary:null, errors:[], fallbackImgs:{}, sourceLayout:null }; render(); }
function importSkipOne(rid){ const r=IMPORT.rows.find(x=>x.rid===rid); if(!r) return; r.status='skipped'; render(); }
async function importCommitOne(rid){
  const r=IMPORT.rows.find(x=>x.rid===rid); if(!r||r.status!=='pending') return;
  const ok = await commitOneRow(r);
  if(ok){ r.status='confirmed'; render(); }
  else { toast('Save failed for '+r.sku); }
}
async function importCommitAll(){
  const pending=IMPORT.rows.filter(x=>x.status==='pending');
  if(!pending.length){ toast('Nothing to confirm'); return; }
  toast(`Saving ${pending.length}…`);
  let ok=0,bad=0;
  for(const r of pending){
    const done=await commitOneRow(r);
    if(done){ r.status='confirmed'; ok++; } else bad++;
  }
  toast(`Saved ${ok}${bad?`, ${bad} failed`:''}`);
  await loadAll(); render();
}
async function commitOneRow(r){
  try{
    // Upload embedded image if present
    let imageUrls = [];
    if(r.imgBlobKey && r.mediaBlobUrls && r.mediaBlobUrls[r.imgBlobKey]){
      const url=r.mediaBlobUrls[r.imgBlobKey];
      const blob=await fetch(url).then(x=>x.blob());
      const uploaded=await uploadProductImage(new File([blob],'xls-photo.'+((r.imgBlobKey.split('.').pop())||'jpg'),{type:blob.type||'image/jpeg'}), r.sku);
      imageUrls.push(uploaded);
    }
    // Fallback images matched by SKU filename
    if(!imageUrls.length && r.sku && IMPORT.fallbackImgs[r.sku]){
      for(const f of IMPORT.fallbackImgs[r.sku]){
        const uploaded=await uploadProductImage(f,r.sku);
        imageUrls.push(uploaded);
      }
    }
    // Preserve existing images if update and no new ones supplied
    if(r.mode==='update' && !imageUrls.length && r.existing){
      imageUrls = productImages(r.existing);
    }
    const row = {
      sku: r.sku||null, barcode: r.barcode||null,
      en: r.en, ar: r.ar,
      description_en: r.description_en || null,
      description_ar: r.description_ar || null,
      category: r.category || 'decor',
      sub_category: r.sub_category || null,
      cost_usd: r.cost_usd,
      icon: (r.existing&&r.existing.icon)||'basket',
      images: imageUrls
    };
    // Price rule: preserve existing on update unless admin edited (r.price !== r.existing.price when different)
    if(r.mode==='update' && r.existing){
      const existingPrice = r.existing.price;
      const edited = (r.price!==existingPrice);
      row.price = edited ? r.price : existingPrice;
    } else {
      row.price = r.price;
    }
    if(DEMO){
      if(r.mode==='update' && r.existing){ Object.assign(r.existing,row); }
      else demoProducts.push({id:++demoSeq,...row,best:false});
      return true;
    }
    if(r.mode==='update' && r.existing){
      const {error}=await sb.from('products').update(row).eq('id',r.existing.id);
      if(error) throw error;
    } else {
      row.gradient=['g1','g2','g3','g4','g5'][Math.floor(Math.random()*5)];
      const {error}=await sb.from('products').insert(row);
      if(error) throw error;
    }
    return true;
  }catch(e){
    console.error('commitOneRow failed:',e);
    return false;
  }
}

/* Fallback: dropzone for image files, matched to rows by SKU-in-filename */
function importFallbackDrop(){
  const box=document.createElement('div');
  box.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:16px;padding:22px;max-width:520px;width:92%">
      <h3 style="margin-bottom:10px;color:var(--plum)">Match images by SKU</h3>
      <p class="muted" style="margin-bottom:12px">Drop image files here. I'll match them to rows whose SKU appears in the filename (slashes become dashes). Files without a match are ignored.</p>
      <div class="dropzone" id="fbDrop"><strong>Drop images here</strong><span class="sm">or click to choose</span></div>
      <input type="file" id="fbInput" accept="image/*" multiple style="display:none">
      <div style="text-align:right;margin-top:14px">
        <button class="btn btn-g" id="fbClose">Done</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(box);
  const closeBtn=box.querySelector('#fbClose');
  const dz=box.querySelector('#fbDrop');
  const inp=box.querySelector('#fbInput');
  const process=files=>{
    let matched=0;
    for(const f of files){
      const base=f.name.replace(/\.[^.]+$/,'').toLowerCase();
      const stem=base.replace(/_\d+$/,''); // strip _2, _3 etc.
      for(const r of IMPORT.rows){
        if(!r.sku) continue;
        const skuDashed=r.sku.replace(/\//g,'-').toLowerCase();
        if(base.startsWith(skuDashed) || stem===skuDashed){
          (IMPORT.fallbackImgs[r.sku]=IMPORT.fallbackImgs[r.sku]||[]).push(f);
          const url=URL.createObjectURL(f);
          if(!r.imgPreview) r.imgPreview=url;
          matched++;
          break;
        }
      }
    }
    toast(`Matched ${matched} of ${files.length}`);
    render();
  };
  dz.onclick=()=>inp.click();
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('on')}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{dz.classList.remove('on')}));
  dz.addEventListener('drop',e=>{ e.preventDefault(); process([...(e.dataTransfer.files||[])]); });
  inp.onchange=e=>{ process([...(e.target.files||[])]); inp.value=''; };
  closeBtn.onclick=()=>box.remove();
}

  try{
    const url=await uploadProductImage(file, EDIT.sku||'unknown');
    EDIT.photos[ix]=url; EDIT.dirty=true;
    paintEditModal();
    setEditStatus(`Photo ${ix+1} uploaded — not saved yet`,'');
  }catch(err){
    setEditStatus('Upload failed: '+(err.message||err),'err');
  }
}
function removeSlot(i){
  EDIT.photos.splice(i,1);
  // shift down; slot count stays 5
  paintEditModal();
  EDIT.dirty=true;
}
function slotDragStart(e,i){ editSlotDragIx=i; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function slotDragOver(e,i){
  if(editSlotDragIx===-1||editSlotDragIx===i) return;
  e.preventDefault();
  e.currentTarget.classList.add('drop-target');
}
function slotDragLeave(e){ e.currentTarget.classList.remove('drop-target'); }
function slotDrop(e,i){
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if(editSlotDragIx===-1||editSlotDragIx===i){ editSlotDragIx=-1; return; }
  const item=EDIT.photos.splice(editSlotDragIx,1)[0];
  EDIT.photos.splice(i,0,item);
  EDIT.photos = EDIT.photos.slice(0,5);
  editSlotDragIx=-1;
  EDIT.dirty=true;
  paintEditModal();
}
function slotDragEnd(){
  document.querySelectorAll('.pslot').forEach(el=>el.classList.remove('dragging','drop-target'));
  editSlotDragIx=-1;
}

async function saveEditModal(){
  if(!EDIT || EDIT.saving) return;
  EDIT.saving=true;
  setEditStatus('Saving…','');
  try{
    const s=EDIT; const p=s.original;
    if(!s.en.trim()){ setEditStatus('Name (English) is required','err'); EDIT.saving=false; return; }
    if(s.hasSizes){
      const anyPrice = ['S','M','L'].some(k=>s.sizePrices[k]!==''&&s.sizePrices[k]!=null);
      if(!anyPrice){ setEditStatus('Fill at least one size price','err'); EDIT.saving=false; return; }
    }
    // Primary row payload
    const primaryImages = s.hasSizes
      ? [s.photos[0]].concat(s.photos.slice(3)).filter(Boolean)   // slot1 (Small) + slots 4/5 shared
      : s.photos.filter(Boolean);
    const parsePrice = v => (v===''||v==null) ? null : (isNaN(+v) ? null : +v);
    const cost = parsePrice(s.cost);
    const primaryPayload={
      en:s.en.trim(), ar:s.ar.trim()||null,
      description_en: s.descEn||null, description_ar: s.descAr||null,
      sku:s.sku||null, barcode:s.barcode||null,
      category:s.category, best:s.best, icon:s.icon,
      cost_usd:cost,
      images: primaryImages,
      price: s.hasSizes ? parsePrice(s.sizePrices.S) : parsePrice(s.price),
      variant_group: s.hasSizes ? (s.isReal ? p.variant_group : ('sz-'+(s.sku||p.sku||p.id))) : null,
      variant_label_en: s.hasSizes ? (s.isReal ? p.variant_label_en : SIZE_LABELS.S.en) : null,
      variant_label_ar: s.hasSizes ? (s.isReal ? p.variant_label_ar : SIZE_LABELS.S.ar) : null,
      variant_order: s.hasSizes ? (s.isReal ? p.variant_order : 1) : null
    };
    if(DEMO){
      Object.assign(p, primaryPayload);
      setEditStatus('Saved ✓ (demo)','saved');
      EDIT.dirty=false; EDIT.saving=false;
      setTimeout(()=>closeEditModal(true),700);
      return;
    }
    // 1) Update primary
    {
      const {error}=await sb.from('products').update(primaryPayload).eq('id',p.id);
      if(error) throw error;
    }
    // 2) Handle quick-size children if not a real variant family.
    //    CRITICAL SAFETY GATE: only touch other rows when the product is
    //    ACTUALLY part of a sz- family. Without this guard,
    //    "x.variant_group === p.variant_group" reduces to "== null" when
    //    editing a non-variant product and matches every non-variant row in
    //    the DB — the previous version of this code deleted 100+ products
    //    on a single save of an unrelated normal product.
    const isQuickSizeFamily = !!(p.variant_group && String(p.variant_group).startsWith('sz-'));
    const willBeQuickSize   = !s.isReal && s.hasSizes;
    if(isQuickSizeFamily || willBeQuickSize){
      const groupTag = primaryPayload.variant_group;
      const targetGroup = p.variant_group || groupTag;
      const existingChildren = targetGroup
        ? PRODUCTS.filter(x => x.variant_group === targetGroup && x.id !== p.id)
        : [];
      const existingBySize={};
      existingChildren.forEach(c=>{
        const key = c.variant_order===2 ? 'M' : c.variant_order===3 ? 'L' : null;
        if(key) existingBySize[key]=c;
      });
      const targetSizes = s.hasSizes ? ['M','L'] : [];
      // Sizes turned OFF — only delete siblings when we were a sz- family AND
      // the user actively toggled sizes off. Never on a first-time save of a
      // normal product.
      if(!s.hasSizes){
        if(isQuickSizeFamily && s.initialHasSizes && existingChildren.length){
          for(const c of existingChildren){
            const {error}=await sb.from('products').delete().eq('id',c.id);
            if(error) throw error;
          }
        }
      } else {
        for(const key of targetSizes){
          const price = parsePrice(s.sizePrices[key]);
          const img = s.photos[key==='M'?1:2] || null;
          const childImages = img ? [img] : [];
          const childSku = (s.sku||p.sku||('P'+p.id))+'-'+key;
          const childBarcode = s.barcode ? s.barcode + '-' + key : null;
          const childPayload = {
            en: s.en.trim() + ' — ' + SIZE_LABELS[key].en,
            ar: (s.ar.trim()||s.en.trim()) + ' — ' + SIZE_LABELS[key].ar,
            description_en: s.descEn||null, description_ar: s.descAr||null,
            sku: childSku,
            barcode: childBarcode,
            category: s.category, best: false, icon: s.icon,
            cost_usd: cost,
            images: childImages,
            price,
            variant_group: groupTag,
            variant_label_en: SIZE_LABELS[key].en,
            variant_label_ar: SIZE_LABELS[key].ar,
            variant_order: key==='M'?2:3
          };
          if(existingBySize[key]){
            const {error}=await sb.from('products').update(childPayload).eq('id',existingBySize[key].id);
            if(error) throw error;
          } else if(price!=null || img){
            const {error}=await sb.from('products').insert(childPayload);
            if(error) throw error;
          }
          // If price+img both empty and no existing → skip creation
        }
      }
    }
    setEditStatus('Saved ✓','saved');
    EDIT.dirty=false; EDIT.saving=false;
    await loadAll();
    setTimeout(()=>closeEditModal(true),600);
  }catch(err){
    console.error('save failed:',err);
    setEditStatus('Save failed: '+(err.message||err),'err');
    EDIT.saving=false;
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && EDIT){ closeEditModal(); }
});

/* Quick pricing inline save — Price / Cost / Description EN / Description AR
   editable directly in the products list. Blur (or Enter) writes to Supabase
   with an optimistic local update; on failure we revert and toast. */
async function quickSaveField(id, field, val, el){
  const p = PRODUCTS.find(x=>x.id===id); if(!p) return;
  const dbCol = field;
  const uiKey = field==='cost_usd' ? 'cost_usd' : field==='description_en' ? 'description_en' : field==='description_ar' ? 'description_ar' : 'price';
  let payloadVal;
  if(field==='price' || field==='cost_usd'){
    payloadVal = (val==='' || val==null) ? null : parseFloat(val);
    if(payloadVal!==null && isNaN(payloadVal)){
      toast('Invalid number'); el.value = p[uiKey]!=null ? p[uiKey] : ''; return;
    }
  } else {
    payloadVal = String(val||'').trim() || null;
  }
  // No-op if unchanged
  const current = p[uiKey] == null ? '' : String(p[uiKey]);
  const proposed = payloadVal == null ? '' : String(payloadVal);
  if(current === proposed) return;
  const originalBorder = el.style.borderColor;
  el.style.borderColor = 'var(--gold)';
  try{
    if(DEMO){ p[uiKey] = payloadVal; }
    else {
      const patch = {}; patch[dbCol] = payloadVal;
      const {error} = await sb.from('products').update(patch).eq('id', id);
      if(error) throw error;
      p[uiKey] = payloadVal;
    }
    el.style.borderColor = '#22C55E';
    setTimeout(()=>{ el.style.borderColor = originalBorder; }, 900);
  }catch(err){
    console.error('quick save failed',err);
    toast('Save failed: '+(err.message||err));
    el.value = p[uiKey]!=null ? p[uiKey] : '';
    el.style.borderColor = 'var(--bad)';
    setTimeout(()=>{ el.style.borderColor = originalBorder; }, 1400);
  }
}

(async function(){
  if(sb){const {data}=await sb.auth.getSession();SESSION=data.session||null;}
  boot();
})();
